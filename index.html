<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIGPS</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf9f7;--bg2:#f1ede8;--bg3:#e8e3db;--text:#5a5651;--text2:#8b8580;--text3:#b4ada5;--border:#e3dcd4;--border2:#d4ccc2;--accent:#6b7171;--radius:8px;
  --cat-data:#d4dce8;--cat-meeting:#e8d4d4;--cat-admin:#d4e8d8;--cat-questionnaire:#e8e2d0;--cat-platform:#ddd4e8;
  --cat-data-text:#4a5a70;--cat-meeting-text:#704a4a;--cat-admin-text:#4a7055;--cat-questionnaire-text:#706040;--cat-platform-text:#604870;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;padding:16px 12px;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sb-logo{display:flex;align-items:center;gap:10px;padding:0 0 16px;border-bottom:1px solid var(--border);cursor:pointer}
.sb-logo-icon{width:32px;height:32px;background:var(--text);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:700;font-size:13px}
.sb-logo-text{font-size:16px;font-weight:600;color:var(--text)}
.sb-nav{flex:1;overflow-y:auto;padding:12px 0;margin-top:12px}
.team-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.member-cell{display:flex;flex-direction:column;align-items:center;gap:3px}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.sb-item{padding:8px 12px;border-radius:var(--radius);cursor:pointer;color:var(--text2);margin-bottom:2px;user-select:none}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--border);color:var(--text);font-weight:500}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.view{display:none;flex:1;overflow:hidden}
.view.active{display:flex;flex-direction:column}
.cal-wrap{display:flex;flex:1;overflow:hidden}
.cal-left{width:200px;border-right:1px solid var(--border);padding:14px;overflow-y:auto;background:var(--bg2);display:flex;flex-direction:column;gap:12px}
.cal-center{flex:1;display:flex;flex-direction:column;overflow-y:auto;min-height:0}
.cal-right{width:200px;border-left:1px solid var(--border);padding:14px;overflow-y:auto;background:var(--bg2)}
.cal-side-title{font-size:10px;font-weight:700;padding:4px 8px;border-radius:4px;display:inline-block;text-transform:uppercase;letter-spacing:0.05em}
.cal-side-title.current{background:#e5e7e6;color:#6b7171}
.cal-side-title.next{background:#e8e0d8;color:#8a7460}
.cal-side-title.deadline{background:#e8e0dd;color:#8a6b66}
.cal-side-title.meeting{background:var(--cat-meeting);color:var(--cat-meeting-text)}
.cal-side-item{font-size:11px;padding:5px 7px;border-radius:4px;color:var(--text2);cursor:pointer;margin-bottom:4px;display:flex;gap:4px;align-items:flex-start}
.cal-side-item:hover{background:var(--border);color:var(--text)}
.cal-side-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:3px}
.cal-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.cal-month-year{text-align:center;flex:1}
.cal-nav-title{font-size:20px;font-weight:600;color:var(--text)}
.cal-nav-year{font-size:13px;color:var(--text2);margin-top:2px}
.arrow-btn,.cal-today-btn,.add-round{border:1.5px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s}
.add-round{width:32px;height:32px;font-size:18px;line-height:1}
.cal-today-btn{border-radius:var(--radius);width:auto;padding:0 12px;font-size:11px;font-weight:500}
.arrow-btn:hover,.cal-today-btn:hover,.add-round:hover{background:var(--bg2);color:var(--text)}
.cal-grid{padding:12px;display:flex;flex-direction:column;gap:0}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);margin-bottom:1px}
.cal-dow{font-size:10px;color:var(--text3);text-align:center;font-weight:600;padding:6px 0;background:var(--bg)}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);flex:1}
.cal-cell{min-height:100px;padding:6px;background:var(--bg);cursor:pointer;overflow:hidden;display:flex;flex-direction:column;vertical-align:top}
.cal-cell:hover{background:var(--bg2)}
.cal-cell.weekend{background:#fdf5f0}
.cal-cell.weekend .cal-date-num{color:#c97070}
.cal-cell.holiday{background:#fdf5f0}
.cal-cell.holiday .cal-date-num{color:#c97070;font-weight:600}
.cal-cell.weekend.holiday{background:#fdf5f0}
.cal-cell.other-month{background:#faf9f7 !important;color:var(--text3)}
.cal-cell.other-month .cal-date-num{color:var(--text3)}
.cal-date-num{font-size:11px;color:var(--text2);margin-bottom:3px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:500}
.cal-date-num.today{font-weight:700;color:var(--text)}
.cal-cell.is-today{background:#ede8e0}
.cal-chip{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.2}
.cal-chip:hover{opacity:0.8}
.cal-chip.chip-data{background:var(--cat-data);color:var(--cat-data-text)}
.cal-chip.chip-meeting{background:var(--cat-meeting);color:var(--cat-meeting-text)}
.cal-chip.chip-admin{background:var(--cat-admin);color:var(--cat-admin-text)}
.cal-chip.chip-questionnaire{background:var(--cat-questionnaire);color:var(--cat-questionnaire-text)}
.cal-chip.chip-platform{background:var(--cat-platform);color:var(--cat-platform-text)}
.tab-header{display:flex;gap:2px;background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;flex-shrink:0}
.tab{padding:8px 16px;font-size:12px;border:none;background:transparent;cursor:pointer;color:var(--text2);border-radius:var(--radius);font-weight:500;transition:all 0.2s}
.tab:hover{background:var(--bg3);color:var(--text)}
.tab.active{background:var(--border);color:var(--text)}
.task-toolbar{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.filter-chip{padding:4px 12px;font-size:11px;border-radius:12px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;color:var(--text2);transition:all 0.2s;font-weight:500}
.filter-chip:hover{background:var(--bg2)}
.filter-chip.active{border-color:var(--accent);background:#e5e7e6;color:#6b7171}
.table-wrap{flex:1;overflow:auto}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:2;white-space:nowrap}
.data-table td{padding:7px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tr:hover td{background:var(--bg2)}
.data-table tr.done-row td{opacity:0.4}
.check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;background:transparent}
.check.done{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.status{display:inline-flex;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500}
.st-done{background:#e5e8e3;color:#6f8070}
.st-inprogress{background:#e5e7e6;color:#6b7171}
.st-notstarted{background:var(--bg3);color:var(--text2)}
.st-blocked{background:#e8e0dd;color:#8a6b66}
.tag{display:inline-flex;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:500}
.tag-data{background:var(--cat-data);color:var(--cat-data-text)}
.tag-meeting{background:var(--cat-meeting);color:var(--cat-meeting-text)}
.tag-admin{background:var(--cat-admin);color:var(--cat-admin-text)}
.tag-questionnaire{background:var(--cat-questionnaire);color:var(--cat-questionnaire-text)}
.tag-platform{background:var(--cat-platform);color:var(--cat-platform-text)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:8px;border:1px solid var(--border);width:520px;max-height:88vh;overflow-y:auto;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.08)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:600}
.close-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);font-size:14px;display:flex;align-items:center;justify-content:center}
.close-btn:hover{background:var(--bg2)}
.fg{margin-bottom:14px}
.flabel{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.05em}
input,select,textarea{width:100%;padding:7px 10px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--bg2)}
textarea{resize:vertical;min-height:60px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chip-row{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:4px 10px;font-size:11px;border-radius:12px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);transition:all 0.2s}
.chip:hover{background:var(--bg2)}
.chip.on{border-color:var(--accent);background:#e5e7e6;color:#6b7171}
.mem-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;font-size:11px;border-radius:12px;border:1px solid var(--border2);cursor:pointer;color:var(--text2);transition:all 0.2s}
.mem-chip:hover{background:var(--bg2)}
.mem-chip.sel{border-color:var(--accent);background:#e5e7e6;color:#6b7171}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.btn{padding:6px 14px;font-size:12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:5px;transition:all 0.2s}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.btn-primary:hover{background:#5a6161}
.pstar{font-size:13px;cursor:pointer;color:var(--border2);transition:color 0.2s}
.pstar.on{color:#8a6b66}
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:90;align-items:flex-start;justify-content:flex-end}
.detail-overlay.open{display:flex}
.detail-panel{width:420px;height:100vh;background:var(--bg);border-left:1px solid var(--border);overflow-y:auto;padding:24px;box-shadow:-4px 0 20px rgba(0,0,0,0.08)}
.detail-field{margin-bottom:14px}
.detail-field-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.detail-field-val{font-size:13px;color:var(--text)}
.notes-input{width:100%;padding:8px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);resize:vertical;min-height:80px;font-family:inherit}
.notes-input:focus{outline:none;border-color:var(--accent);background:var(--bg2)}
.divider{height:1px;background:var(--border);margin:8px 0}
</style>
</head>

function onPhotoChange(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      // Very aggressive compression: max 60px, quality 0.4
      const MAX=60;
      let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
      else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.4);
      console.log('壓縮後:',Math.round(compressed.length/1024)+'KB');
      refreshPhotoUI(compressed);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt=monthTasks.filter(t=>t.date===ds);
    const dlTasks=tasks.filter(t=>t.deadline===ds&&!(t.date===ds));// deadline tasks not already shown
    const allChipTasks=[...dt,...dlTasks];
    const isT=new Date(calYear,calMonth,d).getTime()===today.getTime(),numCls=isT?'cal-date-num today':'cal-date-num',cellCls=(new Date(ds).getDay()===0||new Date(ds).getDay()===6)?'weekend':'',holidayName=TW_HOLIDAYS[ds]||'',holidayCls=holidayName?'holiday':'',todayCls=isT?'is-today':'',holidayLabel=holidayName?`<div style="font-size:8px;color:#c97070;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${holidayName}</div>`:'';
    const chips=allChipTasks.slice(0,3).map(t=>{
      const isDL=!t.date||t.date!==ds;
      const border=isDL?'border-left:2px solid #c97070;':'';
      return `<div class="cal-chip chip-${t.cat||'data'}" style="${border}" onclick="openEdit('${t.id}');event.stopPropagation()">${t.title}</div>`;
    }).join('');
    const more=allChipTasks.length>3?`<div style="font-size:9px;color:var(--text3);padding:1px">+${allChipTasks.length-3}</div>`:'';
    cells+=`<div class="cal-cell ${cellCls} ${holidayCls} ${todayCls}" onclick="openAddOnDate('${ds}')"><div class="${numCls}">${d}</div>${holidayLabel}${chips}${more}</div>`;
  }
  const total=startDow+lastDay,rem=(7-total%7)%7;
  for(let i=0;i<rem;i++){cells+=`<div class="cal-cell other-month"><div class="cal-date-num">${i+1}</div></div>`;}
  document.getElementById('calBody').innerHTML=cells;
  renderDashSidebar();
}

function renderDashSidebar(){
  const now=new Date(),curY=now.getFullYear(),curM=now.getMonth(),nextY=curM===11?curY+1:curY,nextM=curM===11?0:curM+1,curStr=`${curY}-${String(curM+1).padStart(2,'0')}`,nextStr=`${nextY}-${String(nextM+1).padStart(2,'0')}`;
  // 當月/次月代辦：排除會議
  const cur=tasks.filter(t=>t.date&&t.date.startsWith(curStr)&&!t.done&&t.cat!=='meeting');
  const nxt=tasks.filter(t=>t.date&&t.date.startsWith(nextStr)&&!t.done&&t.cat!=='meeting');
  // 重要事項：urgency === 'high'（三個驚嘆號）
  const urgent=tasks.filter(t=>t.urgency==='high'&&!t.done).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  // 會議
  const mtg=tasks.filter(t=>t.cat==='meeting'&&t.date&&!t.done).sort((a,b)=>a.date.localeCompare(b.date));

  document.getElementById('dashCurrentMonth').innerHTML=cur.length?cur.map(renderSideItem).join(''):'<div style="font-size:11px;color:var(--text3)">無</div>';
  document.getElementById('dashNextMonth').innerHTML=nxt.length?nxt.map(renderSideItem).join(''):'<div style="font-size:11px;color:var(--text3)">無</div>';
  document.getElementById('dashDeadlines').innerHTML=urgent.length?urgent.map(renderSideItem).join(''):'<div style="font-size:11px;color:var(--text3)">無</div>';
  document.getElementById('dashMeetings').innerHTML=mtg.length?mtg.map(t=>`<div class="cal-side-item" onclick="openEdit('${t.id}')"><div class="cal-side-dot" style="background:var(--cat-meeting-text)"></div><div><div style="font-size:11px">${t.title}</div><div style="font-size:10px;color:var(--text3)">${t.date||''}</div></div></div>`).join(''):'<div style="font-size:11px;color:var(--text3)">無</div>';

  </div>`;

  let html='';
  for(const {at,t} of yearTasks){
    try{
      const isDone=!!(t&&t.done);
      const parts=t&&Array.isArray(t.parts)?t.parts:[];
      const assignees=MEMBERS.filter(m=>parts.includes(m.id))
        .map(m=>{try{return `<span style="display:flex;flex-direction:column;align-items:center;gap:2px">${getMemberAvatar(m,22)}<span style="font-size:8px;color:var(--text3)">${(memberData[m.id]&&memberData[m.id].name)||m.name||''}</span></span>`;}catch(e){return '';}}).join('');
      const subs=t&&t.subtasks?Object.values(t.subtasks):[];

      const subDone=subs.filter(s=>s&&s.done).length;
      const badge=hasSub?`<span style="font-size:9px;color:var(--text3);margin-left:4px">${subDone}/${subs.length}</span>`:'';
      const tid=t&&t.id?t.id:'';

      const toggleBtn=hasSub?`<button onclick="event.stopPropagation();progToggleSub('${safeid}')" id="stbtn_${safeid}" style="border:none;background:transparent;cursor:pointer;color:var(--text2);font-size:11px;line-height:1;padding:0 2px">▾</button>`:'';
      html+=`<tr onclick="openProgDetail('${at.key}')" style="cursor:pointer${isDone?';opacity:0.55':''}">

        <td style="font-size:11px;white-space:nowrap">${t&&t.date?t.date:''}</td>

        <td><button onclick="event.stopPropagation();openProgDetail('${at.key}')" style="border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:14px">›</button></td>
      </tr>`;
      if(hasSub){
        for(let si=0;si<subs.length;si++){
          const s=subs[si];
          if(!s)continue;
          const sAssignees=Array.isArray(s.parts)?MEMBERS.filter(m=>s.parts.includes(m.id)).map(m=>{try{return getMemberAvatar(m,18);}catch(e){return '';}}).join(''):'';
          html+=`<tr class="subrow_${safeid}" style="background:var(--bg2)">
            <td style="padding-left:16px"><div class="check ${s.done?'done':''}" onclick="progSubToggle('${at.key}',${si})">${s.done?'✓':''}</div></td>

function updateSubField(si,field,val){
  const t=_detailTaskId?tasks.find(x=>x.id===_detailTaskId):null;
  if(!t||!t.subtasks)return;
  const keys=Object.keys(t.subtasks);
  if(!keys[si])return;
  t.subtasks[keys[si]][field]=val;
  db.ref(`tasks/${t.id}/subtasks/${keys[si]}/${field}`).set(val);
}

function toggleSubMember(si,mid){
  const t=_detailTaskId?tasks.find(x=>x.id===_detailTaskId):null;
  if(!t||!t.subtasks)return;
  const keys=Object.keys(t.subtasks);
  if(!keys[si])return;
  const sub=t.subtasks[keys[si]];
  let parts=[...(sub.parts||[])];
  const idx=parts.indexOf(mid);
  if(idx>=0)parts.splice(idx,1);else parts.push(mid);
  sub.parts=parts;
  db.ref(`tasks/${t.id}/subtasks/${keys[si]}/parts`).set(parts).then(()=>renderDetailSubs(t));
}

function addSubtask(){
  const title=prompt('子計畫名稱：');
  if(!title)return;
  const newSub={title,done:false,date:'',deadline:'',doneDate:'',parts:[],createdAt:new Date().toISOString()};
  // 確保 task 存在
  const ensureTask=(cb)=>{
    let t=_detailTaskId?tasks.find(x=>x.id===_detailTaskId):null;
    if(t){cb(t);return;}
    const at=ANNUAL_TASKS.find(x=>x.key===_detailKey);
    const data={annualKey:_detailKey,progYear:String(progYear),title:at?.label||'',done:false,status:'notstarted',parts:[],subtasks:{}};
    db.ref('tasks').push(data).then(ref=>{
      const newT={id:ref.key,...data};
      tasks.push(newT);
      _detailTaskId=ref.key;
      cb(newT);
    });
  };
  ensureTask(t=>{
    db.ref(`tasks/${t.id}/subtasks`).push(newSub).then(()=>{
      db.ref(`tasks/${t.id}`).once('value',snap=>{
        const updated={id:t.id,...snap.val()};
        const idx=tasks.findIndex(x=>x.id===t.id);
        if(idx>=0)tasks[idx]=updated;else tasks.push(updated);
        renderDetailSubs(updated);
        renderProgContent();
      });
    });
  });
}

function progSubToggle(atKey,si){
  const t=getProgTask(atKey);
  if(!t||!t.subtasks)return;
  const keys=Object.keys(t.subtasks);
  if(!keys[si])return;
  const cur=t.subtasks[keys[si]].done;
  db.ref(`tasks/${t.id}/subtasks/${keys[si]}/done`).set(!cur).then(()=>{
    t.subtasks[keys[si]].done=!cur;
    renderDetailSubs(t);
    renderProgContent();
  });
}

function deleteDetailSub(si){
  if(!confirm('確定刪除子計畫？'))return;
  const t=_detailTaskId?tasks.find(x=>x.id===_detailTaskId):null;
  if(!t||!t.subtasks)return;
  const keys=Object.keys(t.subtasks);
  if(!keys[si])return;
  db.ref(`tasks/${t.id}/subtasks/${keys[si]}`).remove().then(()=>{
    delete t.subtasks[keys[si]];
    renderDetailSubs(t);
    renderProgContent();
  });
}

function quickDone(atKey){
  let t=getProgTask(atKey);
  if(t){
    const newDone=!t.done;
    db.ref('tasks/'+t.id).update({done:newDone,status:newDone?'done':'notstarted',doneDate:newDone?new Date().toISOString().split('T')[0]:''})
      .then(()=>{t.done=newDone;t.status=newDone?'done':'notstarted';t.doneDate=newDone?new Date().toISOString().split('T')[0]:'';renderProgContent();});
  } else {
    const at=ANNUAL_TASKS.find(x=>x.key===atKey);
    const data={annualKey:atKey,progYear:String(progYear),title:at?.label||'',done:true,status:'done',doneDate:new Date().toISOString().split('T')[0],parts:[],subtasks:{}};
    db.ref('tasks').push(data).then(ref=>{tasks.push({id:ref.key,...data});renderProgContent();});
  }
}

function saveTaskDetail(){
  const atKey=_detailKey;
  const at=ANNUAL_TASKS.find(x=>x.key===atKey);
  const date=document.getElementById('tdDate').value;
  const deadline=document.getElementById('tdDeadline').value;
  const doneDate=document.getElementById('tdDoneDate').value;
  const status=document.getElementById('tdStatus').value;
  const desc=document.getElementById('tdDesc').value;
  const done=status==='done';
  const t=_detailTaskId?tasks.find(x=>x.id===_detailTaskId):null;
  const data={annualKey:atKey,progYear:String(progYear),title:at?.label||'',date,deadline,doneDate,status,desc,done,parts:t?.parts||[],subtasks:t?.subtasks||{}};
  if(_detailTaskId){
    db.ref('tasks/'+_detailTaskId).update(data).then(()=>{
      if(t)Object.assign(t,data);
      renderProgContent();closeTaskDetail();
    });
  } else {
    db.ref('tasks').push(data).then(ref=>{
      _detailTaskId=ref.key;
      tasks.push({id:ref.key,...data});
      renderProgContent();closeTaskDetail();
    });
  }
}

function deleteCurrentTask(){
  if(!confirm('確定要刪除此工作的所有記錄？'))return;
  if(!_detailTaskId){closeTaskDetail();return;}
  db.ref('tasks/'+_detailTaskId).remove()
    .then(()=>{
      tasks=tasks.filter(x=>x.id!==_detailTaskId);
      _detailTaskId=null;
      _detailKey=null;
      renderProgContent();
      closeTaskDetail();
    })
    .catch(err=>alert('刪除失敗：'+err.message));
}

function openSubDetail(atKey,si){
  // 開右側面板查看子計畫（目前用 openProgDetail 帶到父工作）
  openProgDetail(atKey);
}

function closeTaskDetail(){document.getElementById('taskDetailOverlay').classList.remove('open');}



// ── 新增/編輯彈窗 ──
function renderProgYearSelect(selectedYear){
  const sel=document.getElementById('iProgYear');
  if(!sel)return;
  sel.innerHTML=progYears.map(y=>`<option value="${y}"${String(y)===String(selectedYear)?'selected':''}>${WAVE_LABELS[y]||y}</option>`).join('');
}

function openAddOnDate(ds){
  openAdd();
  document.getElementById('iDate').value=ds;
}

function openAdd(){
  editingId=null;
  selCreator=MEMBERS.filter(m=>!(memberData[m.id]&&memberData[m.id].deleted))[0]?.id||'m1';
  selParts=[];
  document.getElementById('iTitle').value='';
  document.getElementById('iDesc').value='';
  document.getElementById('iDate').value='';
  document.getElementById('iDeadline').value='';
  document.getElementById('iTimeH').value='09';
  document.getElementById('iTimeM').value='00';
  document.getElementById('iDeadlineH').value='18';
  document.getElementById('iDeadlineM').value='00';
  document.getElementById('iUrgency').value='low';
  const cat=document.getElementById('iCat');cat.value='data';updateCatColor(cat);
  document.querySelector('.modal-footer .btn-primary').textContent='新增';
  const delBtn=document.getElementById('modalDeleteBtn');if(delBtn)delBtn.style.display='none';
  renderProgYearSelect(progYear);
  renderModalMembers();
  document.getElementById('modalOverlay').classList.add('open');
}

function openEdit(id){
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  editingId=id;
  selCreator=t.creator||'m1';
  selParts=[...(t.parts||[])];
  document.getElementById('iTitle').value=t.title||'';
  document.getElementById('iDesc').value=t.desc||'';
  document.getElementById('iDate').value=t.date||'';
  document.getElementById('iDeadline').value=t.deadline||'';
  // parse time
  const tp=(t.time||'09:00').split(':');
  document.getElementById('iTimeH').value=tp[0]||'09';
  const tm=parseInt(tp[1]||'0');
  document.getElementById('iTimeM').value=String(Math.round(tm/10)*10).padStart(2,'0').replace('60','00');
  const dp=(t.deadlineTime||'18:00').split(':');
  document.getElementById('iDeadlineH').value=dp[0]||'18';
  const dm=parseInt(dp[1]||'0');
  document.getElementById('iDeadlineM').value=String(Math.round(dm/10)*10).padStart(2,'0').replace('60','00');
  document.getElementById('iUrgency').value=t.urgency||'low';
  const cat=document.getElementById('iCat');cat.value=t.cat||'data';updateCatColor(cat);
  document.querySelector('.modal-footer button.btn-primary').textContent='儲存';
  const delBtn=document.getElementById('modalDeleteBtn');
  if(delBtn)delBtn.style.display='';
  renderProgYearSelect(t.progYear||progYear);
  renderModalMembers();
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

function updateCatColor(sel){
  const colors={data:'#dce4ef',meeting:'#efdcdc',admin:'#dceee0',questionnaire:'#eee8d8',platform:'#e5dced'};
  sel.style.background=colors[sel.value]||'';
}

function renderModalMembers(){
  const visible=MEMBERS.filter(m=>!(memberData[m.id]&&memberData[m.id].deleted));
  document.getElementById('creatorChips').innerHTML=visible.map(m=>{
    const saved=memberData[m.id]||{};
    const photo=saved.photo;
    const isSel=m.id===selCreator;
    const ring=isSel?'box-shadow:0 0 0 2.5px var(--accent);':'';
    const av=photo?`<img src="${photo}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;${ring}">`:`<div style="width:32px;height:32px;border-radius:50%;background:${m.bg};color:#555;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;${ring}">${m.initials}</div>`;
    return `<div onclick="selCreator='${m.id}';renderModalMembers()" style="cursor:pointer;opacity:${isSel?1:0.4}">${av}</div>`;
  }).join('');
  document.getElementById('partChips').innerHTML=visible.map(m=>{
    const saved=memberData[m.id]||{};
    const name=saved.name||m.name;
    const photo=saved.photo;
    const sel=selParts.includes(m.id);
    const ring=sel?'box-shadow:0 0 0 2.5px var(--accent);':'';
    const av=photo?`<img src="${photo}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;${ring}">`:`<div style="width:40px;height:40px;border-radius:50%;background:${m.bg};color:#555;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;${ring}">${m.initials}</div>`;
    return `<div onclick="const i=selParts.indexOf('${m.id}');i>=0?selParts.splice(i,1):selParts.push('${m.id}');renderModalMembers()" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;opacity:${sel?1:0.4}">
      ${av}<span style="font-size:9px;color:var(--text2);white-space:nowrap">${name}</span>
    </div>`;
  }).join('');
}

function saveTask(){
  const title=document.getElementById('iTitle').value.trim();
  if(!title){alert('請輸入工作名稱');return;}
  const h=document.getElementById('iTimeH').value;
  const m=document.getElementById('iTimeM').value;
  const dh=document.getElementById('iDeadlineH').value;
  const dm=document.getElementById('iDeadlineM').value;
  const selProgYear=document.getElementById('iProgYear')?.value||String(progYear);
  const data={
    title,
    desc:document.getElementById('iDesc').value,
    date:document.getElementById('iDate').value,
    time:`${h}:${m}`,
    deadline:document.getElementById('iDeadline').value,
    deadlineTime:`${dh}:${dm}`,
    cat:document.getElementById('iCat').value,
    urgency:document.getElementById('iUrgency').value,
    status:editingId?(tasks.find(x=>x.id===editingId)?.status||'notstarted'):'notstarted',
    creator:selCreator,
    parts:[...selParts],
    notes:editingId?(tasks.find(x=>x.id===editingId)?.notes||''):'',
    done:editingId?(tasks.find(x=>x.id===editingId)?.done||false):false,
    progYear:selProgYear,
    timestamp:new Date().toISOString()
  };
  if(editingId){db.ref('tasks/'+editingId).update(data);}
  else{db.ref('tasks').push(data);}
  closeModal();
}

function closeDetail(){document.getElementById('detailOverlay').classList.remove('open');}
function deleteTask(id){if(!confirm('確定要刪除?'))return;db.ref('tasks/'+id).remove();}

function switchView(v,el){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  const target=document.getElementById('view-'+v);
  if(target)target.classList.add('active');
  document.querySelectorAll('.sb-item').forEach(x=>x.classList.remove('active'));
  if(el)el.classList.add('active');
  if(v==='progress'){renderProgContent();}
  else if(v==='dashboard'){renderCalendar();renderDashSidebar();}
}

// Don't call renderTeam() here - Firebase on('value') will call it once data loads
loadTasks();
</script>
