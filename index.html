<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIGPS</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf9f7;--bg2:#f1ede8;--bg3:#e8e3db;--text:#5a5651;--text2:#8b8580;--text3:#b4ada5;--border:#e3dcd4;--border2:#d4ccc2;--accent:#6b7171;--radius:8px;
  --cat-data:#d4dce8;--cat-meeting:#e8d4d4;--cat-admin:#d4e8d8;--cat-questionnaire:#e8e2d0;--cat-platform:#ddd4e8;
  --cat-data-text:#4a5a70;--cat-meeting-text:#704a4a;--cat-admin-text:#4a7055;--cat-questionnaire-text:#706040;--cat-platform-text:#604870;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;min-width:240px;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;padding:16px 12px;overflow:hidden;transition:width 0.25s,min-width 0.25s,padding 0.25s,border 0.25s}
.sidebar.collapsed{width:0;min-width:0;padding:0;border-right:none}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sb-logo{display:flex;align-items:center;gap:10px;padding:0 0 16px;border-bottom:1px solid var(--border);cursor:pointer}
.sb-logo-icon{width:32px;height:32px;background:var(--text);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:700;font-size:13px}
.sb-logo-text{font-size:16px;font-weight:600;color:var(--text)}
.sb-nav{flex:1;overflow-y:auto;padding:12px 0;margin-top:12px}
.team-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.member-cell{display:flex;flex-direction:column;align-items:center;gap:3px}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.sb-item{padding:8px 12px;border-radius:var(--radius);cursor:pointer;color:var(--text2);margin-bottom:2px;user-select:none}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--border);color:var(--text);font-weight:500}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.view{display:none;flex:1;overflow:hidden}
.view.active{display:flex;flex-direction:column}

/* Calendar */
.cal-wrap{display:flex;flex:1;overflow:hidden}
.cal-left{width:190px;min-width:190px;border-right:1px solid var(--border);padding:16px 12px;overflow-y:auto;background:var(--bg2);display:flex;flex-direction:column;gap:16px}
.cal-center{flex:1;display:flex;flex-direction:column;overflow-y:auto;min-height:0}
.cal-right{width:190px;min-width:190px;border-left:1px solid var(--border);padding:16px 12px;overflow-y:auto;background:var(--bg2);display:flex;flex-direction:column;gap:16px}
.cal-side-section{display:flex;flex-direction:column;gap:8px}
.cal-side-title{font-size:10px;font-weight:700;padding:4px 8px;border-radius:4px;display:inline-block;text-transform:uppercase;letter-spacing:0.05em}
.cal-side-title.current{background:#e5e7e6;color:#6b7171}
.cal-side-title.next{background:#e8e0d8;color:#8a7460}
.cal-side-title.deadline{background:#e8e0dd;color:#8a6b66}
.cal-side-title.meeting{background:var(--cat-meeting);color:var(--cat-meeting-text)}
.cal-side-item{font-size:11px;padding:5px 7px;border-radius:4px;color:var(--text2);cursor:pointer;display:flex;gap:4px;align-items:flex-start}
.cal-side-item:hover{background:var(--border);color:var(--text)}
.cal-side-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:3px}
.cal-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.cal-month-year{text-align:center;flex:1}
.cal-nav-title{font-size:20px;font-weight:600;color:var(--text)}
.cal-nav-year{font-size:13px;color:var(--text2);margin-top:2px}
.arrow-btn,.cal-today-btn,.add-round{border:1.5px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s}
.add-round{width:32px;height:32px;font-size:18px;line-height:1}
.cal-today-btn{border-radius:var(--radius);width:auto;padding:0 12px;font-size:11px;font-weight:500}
.arrow-btn:hover,.cal-today-btn:hover,.add-round:hover{background:var(--bg2);color:var(--text)}
.cal-grid{padding:10px;display:flex;flex-direction:column;gap:0;flex:1}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);margin-bottom:1px}
.cal-dow{font-size:10px;color:var(--text3);text-align:center;font-weight:600;padding:6px 0;background:var(--bg)}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.cal-cell{min-height:90px;padding:5px;background:var(--bg);cursor:pointer;overflow:hidden;display:flex;flex-direction:column;vertical-align:top}
.cal-cell:hover{background:var(--bg2)}
.cal-cell.weekend{background:#fdf5f0}
.cal-cell.weekend .cal-date-num{color:#c97070}
.cal-cell.holiday .cal-date-num{color:#c97070;font-weight:600}
.cal-cell.other-month{background:#faf9f7!important}
.cal-cell.other-month .cal-date-num{color:var(--text3)}
.cal-date-num{font-size:11px;color:var(--text2);margin-bottom:2px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:500}
.cal-date-num.today{font-weight:700;color:var(--text)}
.cal-cell.is-today{background:#ede8e0}
.cal-chip{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.3}
.cal-chip:hover{opacity:0.8}
.cal-chip.chip-data{background:var(--cat-data);color:var(--cat-data-text)}
.cal-chip.chip-meeting{background:var(--cat-meeting);color:var(--cat-meeting-text)}
.cal-chip.chip-admin{background:var(--cat-admin);color:var(--cat-admin-text)}
.cal-chip.chip-questionnaire{background:var(--cat-questionnaire);color:var(--cat-questionnaire-text)}
.cal-chip.chip-platform{background:var(--cat-platform);color:var(--cat-platform-text)}

/* Tasks table */
.task-toolbar{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;align-items:center}
.filter-chip{padding:4px 12px;font-size:11px;border-radius:12px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;color:var(--text2);transition:all 0.2s;font-weight:500}
.filter-chip:hover{background:var(--bg2)}
.filter-chip.active{border-color:var(--accent);background:#e5e7e6;color:#6b7171}
.table-wrap{flex:1;overflow:auto}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:2;white-space:nowrap}
.data-table td{padding:7px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tr:hover td{background:var(--bg2)}
.data-table tr.done-row td{opacity:0.4}
.check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;background:transparent}
.check.done{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.status{display:inline-flex;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500}
.st-done{background:#e5e8e3;color:#6f8070}
.st-inprogress{background:#e5e7e6;color:#6b7171}
.st-notstarted{background:var(--bg3);color:var(--text2)}
.tag{display:inline-flex;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:500}
.tag-data{background:var(--cat-data);color:var(--cat-data-text)}
.tag-meeting{background:var(--cat-meeting);color:var(--cat-meeting-text)}
.tag-admin{background:var(--cat-admin);color:var(--cat-admin-text)}
.tag-questionnaire{background:var(--cat-questionnaire);color:var(--cat-questionnaire-text)}
.tag-platform{background:var(--cat-platform);color:var(--cat-platform-text)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:8px;border:1px solid var(--border);width:520px;max-height:88vh;overflow-y:auto;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.08)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:600}
.close-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);font-size:14px;display:flex;align-items:center;justify-content:center}
.close-btn:hover{background:var(--bg2)}
.fg{margin-bottom:14px}
.flabel{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.05em}
input,select,textarea{width:100%;padding:7px 10px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--bg2)}
textarea{resize:vertical;min-height:60px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.btn{padding:6px 14px;font-size:12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:5px;transition:all 0.2s}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.btn-primary:hover{background:#5a6161}
.btn-danger{color:#c97070;border-color:#e0d0c5}
.btn-danger:hover{background:#fdf0ee}

/* Detail Panel (right slide-in) */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:90;align-items:flex-start;justify-content:flex-end}
.detail-overlay.open{display:flex}
.detail-panel-inner{width:420px;height:100vh;background:var(--bg);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;box-shadow:-4px 0 20px rgba(0,0,0,0.08)}

/* Member edit overlay */
.member-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:110;align-items:center;justify-content:center}
.member-overlay.open{display:flex}

/* Progress */
.prog-bar-wrap{padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.dnd-over{background:var(--bg3)!important;outline:2px dashed var(--accent)!important;}
tr[draggable]{cursor:grab}
tr[draggable]:active{cursor:grabbing}

/* Sub rows */
.sub-row{background:var(--bg2)}
.sub-row td{font-size:11px;color:var(--text2)}
</style>
</head>
<body>
<div class="app">

<!-- SIDEBAR -->
<div class="sidebar collapsed" id="mainSidebar">
  <div class="sb-logo" onclick="switchView('dashboard',null)">
    <div class="sb-logo-icon">T</div>
    <div class="sb-logo-text">TIGPS</div>
  </div>
  <div class="sb-nav">
    <div class="team-grid" id="sidebarTeam"></div>
    <div class="sb-item" onclick="switchView('progress',this)">📊 工作進度</div>
  </div>
</div>

<button id="sidebarToggleBtn" onclick="toggleSidebar()" style="position:fixed;top:12px;left:12px;z-index:200;border:1px solid var(--border);background:var(--bg2);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text2)">☰</button>

<!-- MAIN -->
<div class="main">
  <div class="content">

    <!-- DASHBOARD / CALENDAR -->
    <div class="view active" id="view-dashboard">
      <div class="cal-wrap">

        <!-- Left sidebar -->
        <div class="cal-left">
          <div class="cal-side-section">
            <span class="cal-side-title current">當月代辦</span>
            <div id="dashCurrentMonth"></div>
          </div>
          <div class="cal-side-section">
            <span class="cal-side-title next">次月代辦</span>
            <div id="dashNextMonth"></div>
          </div>
        </div>

        <!-- Calendar center -->
        <div class="cal-center">
          <div class="cal-nav">
            <button class="arrow-btn" onclick="changeCalMonth(-1)">‹</button>
            <div class="cal-month-year">
              <div class="cal-nav-title" id="calMonthTitle"></div>
              <div class="cal-nav-year" id="calYearLabel"></div>
            </div>
            <button class="arrow-btn" onclick="changeCalMonth(1)">›</button>
            <button class="cal-today-btn" onclick="goToday()">Today</button>
            <button class="add-round" onclick="openAdd()" style="margin-left:auto">＋</button>
          </div>
          <div class="cal-grid">
            <div class="cal-dow-row">
              <div class="cal-dow">日</div><div class="cal-dow">一</div><div class="cal-dow">二</div>
              <div class="cal-dow">三</div><div class="cal-dow">四</div><div class="cal-dow">五</div><div class="cal-dow">六</div>
            </div>
            <div class="cal-body" id="calBody"></div>
          </div>
        </div>

        <!-- Right sidebar -->
        <div class="cal-right">
          <div class="cal-side-section">
            <span class="cal-side-title deadline">重要事項</span>
            <div id="dashDeadlines"></div>
          </div>
          <div class="cal-side-section">
            <span class="cal-side-title meeting">會議</span>
            <div id="dashMeetings"></div>
          </div>
        </div>

      </div>
    </div><!-- /dashboard -->

    <!-- PROGRESS VIEW -->
    <div class="view" id="view-progress">
      <div class="task-toolbar">
        <div style="display:flex;gap:6px;flex-wrap:wrap" id="progYearTabs"></div>
        <div style="margin-left:auto;display:flex;gap:6px">
          <button class="add-round" onclick="addNextProgYear()" title="新增下一波次">＋</button>
        </div>
      </div>
      <div class="prog-bar-wrap" id="progBar"></div>
      <div class="table-wrap">
        <table class="data-table" id="progTable">
          <thead>
            <tr>
              <th style="width:28px"></th>
              <th style="min-width:90px">日期</th>
              <th style="min-width:160px">
                名稱
                <button onclick="openProgNew()" style="border:none;background:var(--bg3);color:var(--text2);border-radius:4px;padding:1px 7px;cursor:pointer;font-size:11px;font-weight:600;margin-left:6px">＋</button>
              </th>
              <th style="min-width:110px">負責人員</th>
              <th style="min-width:90px">Deadline</th>
              <th style="min-width:90px">完成日期</th>
              <th style="width:36px"></th>
            </tr>
          </thead>
          <tbody id="progTbody"></tbody>
        </table>
      </div>
    </div><!-- /progress -->

  </div><!-- /content -->
</div><!-- /main -->
</div><!-- /app -->

<!-- ══════════════════════════════════════
     TASK DETAIL OVERLAY (right panel)
══════════════════════════════════════ -->
<div class="detail-overlay" id="taskDetailOverlay" onclick="if(event.target===this)closeTaskDetail()">
  <div class="detail-panel-inner">
    <div style="padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0">
      <span id="tdCatBadge" style="font-size:11px;padding:2px 10px;border-radius:4px;font-weight:600"></span>
      <span id="tdTitle" style="font-size:15px;font-weight:600;flex:1;color:var(--text)"></span>
      <button class="close-btn" onclick="closeTaskDetail()">✕</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px">
      <!-- Assignees -->
      <div>
        <div class="flabel">負責人員</div>
        <div id="tdAssignees" style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px"></div>
      </div>
      <!-- Dates -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div class="flabel">日期</div>
          <input type="date" id="tdDate" style="margin-top:4px">
        </div>
        <div>
          <div class="flabel">Deadline</div>
          <input type="date" id="tdDeadline" style="margin-top:4px">
        </div>
        <div>
          <div class="flabel">完成日期</div>
          <input type="date" id="tdDoneDate" style="margin-top:4px">
        </div>
        <div>
          <div class="flabel">狀態</div>
          <select id="tdStatus" style="margin-top:4px">
            <option value="notstarted">未開始</option>
            <option value="inprogress">進行中</option>
            <option value="done">完成</option>
          </select>
        </div>
      </div>
      <!-- Desc -->
      <div>
        <div class="flabel">說明</div>
        <textarea id="tdDesc" style="margin-top:4px;min-height:60px"></textarea>
      </div>
      <!-- Subtasks -->
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div class="flabel" style="margin-bottom:0">子計畫</div>
          <button onclick="addSubtask()" style="font-size:10px;padding:3px 10px;border:1px solid var(--border2);border-radius:4px;background:transparent;cursor:pointer;color:var(--text2)">＋ 新增</button>
        </div>
        <div id="tdSubtasks"></div>
      </div>
    </div>
    <div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:space-between;flex-shrink:0">
      <button class="btn btn-danger" onclick="deleteCurrentTask()">刪除</button>
      <button class="btn btn-primary" onclick="saveTaskDetail()">儲存</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     ADD/EDIT TASK MODAL
══════════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div style="display:flex;align-items:flex-end;gap:8px;margin-bottom:10px">
      <div id="creatorChips" style="display:flex;gap:6px;align-items:center;flex-shrink:0"></div>
      <div class="fg" style="flex:0 0 auto;margin-bottom:0">
        <label class="flabel">波次</label>
        <select id="iProgYear" style="padding:7px 5px;width:88px"></select>
      </div>
      <div class="fg" style="flex:0 0 auto;margin-bottom:0">
        <label class="flabel">類型</label>
        <select id="iCat" style="padding:7px 6px;width:90px" onchange="updateCatColor(this)">
          <option value="data">📋 資料</option>
          <option value="meeting">🗓 會議</option>
          <option value="admin">📁 行政</option>
          <option value="questionnaire">📝 問卷</option>
          <option value="platform">💻 平台</option>
        </select>
      </div>
      <div class="fg" style="flex:0 0 auto;margin-bottom:0">
        <label class="flabel" style="visibility:hidden">!</label>
        <select id="iUrgency" style="padding:7px 4px;width:54px;text-align:center">
          <option value="low">！</option>
          <option value="mid">！！</option>
          <option value="high">！！！</option>
        </select>
      </div>
      <div style="flex:1"></div>
      <button class="close-btn" onclick="closeModal()" style="margin-bottom:1px">✕</button>
    </div>
    <div style="margin-bottom:14px">
      <input type="text" id="iTitle" placeholder="輸入名稱..." style="width:100%;font-size:14px;font-weight:500;border:none;border-bottom:1.5px solid var(--border2);border-radius:0;padding:5px 0;background:transparent;outline:none">
    </div>
    <div style="display:flex;gap:12px;margin-bottom:14px">
      <div style="flex:1;display:flex;flex-direction:column;gap:6px">
        <div class="fg" style="margin-bottom:0"><label class="flabel">日期</label><input type="date" id="iDate"></div>
        <div class="fg" style="margin-bottom:0">
          <label class="flabel">時間</label>
          <div style="display:flex;gap:3px">
            <select id="iTimeH" style="flex:1;padding:7px 4px;text-align:center">
              <option>00</option><option>01</option><option>02</option><option>03</option><option>04</option><option>05</option><option>06</option><option>07</option><option>08</option><option>09</option><option>10</option><option>11</option><option>12</option><option>13</option><option>14</option><option>15</option><option>16</option><option>17</option><option>18</option><option>19</option><option>20</option><option>21</option><option>22</option><option>23</option>
            </select>
            <span style="display:flex;align-items:center;color:var(--text2)">:</span>
            <select id="iTimeM" style="flex:1;padding:7px 4px;text-align:center">
              <option value="00">00</option><option value="10">10</option><option value="20">20</option><option value="30">30</option><option value="40">40</option><option value="50">50</option>
            </select>
          </div>
        </div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:6px">
        <div class="fg" style="margin-bottom:0"><label class="flabel">Deadline 日期</label><input type="date" id="iDeadline"></div>
        <div class="fg" style="margin-bottom:0">
          <label class="flabel">Deadline 時間</label>
          <div style="display:flex;gap:3px">

function onPhotoChange(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 64;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
      else { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.45);
      refreshPhotoUI(compressed);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Calendar ──────────────────────────────────────────────────────────────────
function renderCalendar() {
  document.getElementById('calMonthTitle').textContent = MONTHS[calMonth];
  document.getElementById('calYearLabel').textContent = calYear + '年';
  const first = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth + 1, 0).getDate();
  const startDow = first.getDay();
  const monthStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}`;

  let cells = '';
  const prevMonth = calMonth === 0 ? 11 : calMonth - 1;
  const prevYear = calMonth === 0 ? calYear - 1 : calYear;
  const prevLastDay = new Date(prevYear, prevMonth + 1, 0).getDate();

  for (let i = 0; i < startDow; i++) {
    const d = prevLastDay - startDow + i + 1;
    cells += `<div class="cal-cell other-month"><div class="cal-date-num">${d}</div></div>`;
  }

  for (let d = 1; d <= lastDay; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt = tasks.filter(t => t.date === ds);
    const dlTasks = tasks.filter(t => t.deadline === ds && t.date !== ds);
    const allChips = [...dt, ...dlTasks];
    const isT = new Date(calYear, calMonth, d).getTime() === today.getTime();
    const numCls = isT ? 'cal-date-num today' : 'cal-date-num';
    const dow = new Date(ds).getDay();
    const weekendCls = (dow === 0 || dow === 6) ? 'weekend' : '';
    const holidayName = TW_HOLIDAYS[ds] || '';
    const holidayCls = holidayName ? 'holiday' : '';
    const todayCls = isT ? 'is-today' : '';
    const holidayLabel = holidayName
      ? `<div style="font-size:8px;color:#c97070;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${holidayName}</div>`
      : '';
    const chips = allChips.slice(0, 3).map(t => {
      const isDL = t.deadline === ds && t.date !== ds;
      const border = isDL ? 'border-left:2px solid #c97070;' : '';
      return `<div class="cal-chip chip-${t.cat||'data'}" style="${border}" onclick="openEdit('${t.id}');event.stopPropagation()">${t.title}</div>`;
    }).join('');
    const more = allChips.length > 3 ? `<div style="font-size:9px;color:var(--text3);padding:1px">+${allChips.length-3}</div>` : '';
    cells += `<div class="cal-cell ${weekendCls} ${holidayCls} ${todayCls}" onclick="openAddOnDate('${ds}')">
      <div class="${numCls}">${d}</div>${holidayLabel}${chips}${more}
    </div>`;
  }

  const total = startDow + lastDay;
  const rem = (7 - total % 7) % 7;
  for (let i = 0; i < rem; i++) cells += `<div class="cal-cell other-month"><div class="cal-date-num">${i+1}</div></div>`;
  document.getElementById('calBody').innerHTML = cells;
}

function changeCalMonth(d) {
  calMonth += d;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
  renderDashSidebar();
}
function goToday() { calYear = new Date().getFullYear(); calMonth = new Date().getMonth(); renderCalendar(); renderDashSidebar(); }

function renderDashSidebar() {
  const now = new Date();
  const curY = now.getFullYear(), curM = now.getMonth();
  const nextY = curM === 11 ? curY + 1 : curY;
  const nextM = curM === 11 ? 0 : curM + 1;
  const curStr = `${curY}-${String(curM+1).padStart(2,'0')}`;
  const nextStr = `${nextY}-${String(nextM+1).padStart(2,'0')}`;

  const cur = tasks.filter(t => t.date && t.date.startsWith(curStr) && !t.done && t.cat !== 'meeting');
  const nxt = tasks.filter(t => t.date && t.date.startsWith(nextStr) && !t.done && t.cat !== 'meeting');
  const urgent = tasks.filter(t => t.urgency === 'high' && !t.done).sort((a,b) => (a.date||'').localeCompare(b.date||''));
  const mtg = tasks.filter(t => t.cat === 'meeting' && t.date && !t.done).sort((a,b) => a.date.localeCompare(b.date));

  const renderItem = t => `<div class="cal-side-item" onclick="openEdit('${t.id}')">
    <div class="cal-side-dot" style="background:#8a6b66;margin-top:4px"></div>
    <div><div style="font-size:11px;line-height:1.3">${t.title}</div><div style="font-size:10px;color:var(--text3)">${t.date||''}</div></div>
  </div>`;

  const empty = '<div style="font-size:11px;color:var(--text3)">無</div>';
  document.getElementById('dashCurrentMonth').innerHTML = cur.length ? cur.map(renderItem).join('') : empty;
  document.getElementById('dashNextMonth').innerHTML = nxt.length ? nxt.map(renderItem).join('') : empty;
  document.getElementById('dashDeadlines').innerHTML = urgent.length ? urgent.map(renderItem).join('') : empty;
  document.getElementById('dashMeetings').innerHTML = mtg.length ? mtg.map(t => `<div class="cal-side-item" onclick="openEdit('${t.id}')">
    <div class="cal-side-dot" style="background:var(--cat-meeting-text);margin-top:4px"></div>
    <div><div style="font-size:11px;line-height:1.3">${t.title}</div><div style="font-size:10px;color:var(--text3)">${t.date||''}</div></div>
  </div>`).join('') : empty;
}

// ── Progress View ─────────────────────────────────────────────────────────────
function initProgTabs() {
  const tabsEl = document.getElementById('progYearTabs');
  tabsEl.innerHTML = progYears.map(y => {
    const active = y === progYear ? 'active' : '';
    return `<button class="filter-chip ${active}" onclick="switchProgYear(${y},this)">${waveLabel(y)}</button>`;
  }).join('');
}

function switchProgYear(y, el) {
  progYear = y;
  document.querySelectorAll('#progYearTabs .filter-chip').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  renderProgContent();
}

function addNextProgYear() {
  const maxYear = Math.max(...progYears);
  const nextYear = maxYear + 1;
  progYears.push(nextYear);
  const tabsEl = document.getElementById('progYearTabs');
  const btn = document.createElement('button');
  btn.className = 'filter-chip';
  btn.textContent = waveLabel(nextYear);
  btn.onclick = function() { switchProgYear(nextYear, this); };
  tabsEl.appendChild(btn);
  switchProgYear(nextYear, btn);
}

function renderProgContent() {
  const barEl = document.getElementById('progBar');
  const tbody = document.getElementById('progTbody');
  if (!barEl || !tbody) return;

  const yearTasks = ANNUAL_TASKS.map(at => ({ at, t: getProgTask(at.key) }));
  const doneCount = yearTasks.filter(x => x.t && x.t.done).length;
  const pct = Math.round(doneCount / ANNUAL_TASKS.length * 100);

  barEl.innerHTML = `<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:5px">
    <span>${waveLabel(progYear)} 年度完成進度</span>
    <span>${doneCount} / ${ANNUAL_TASKS.length}（${pct}%）</span>
  </div>
  <div style="height:8px;background:var(--bg3);border-radius:4px;overflow:hidden">
    <div style="height:100%;background:var(--accent);width:${pct}%;transition:width 0.4s;border-radius:4px"></div>
  </div>`;

  let html = '';
  for (const { at, t } of yearTasks) {
    const isDone = !!(t && t.done);
    const parts = t && Array.isArray(t.parts) ? t.parts : [];
    const vis = getActiveMembers();
    const assignees = vis.filter(m => parts.includes(m.id))
      .map(m => `<span style="display:flex;flex-direction:column;align-items:center;gap:2px">
        ${getMemberAvatar(m, 22)}
        <span style="font-size:8px;color:var(--text3)">${(memberData[m.id]&&memberData[m.id].name)||m.name||''}</span>
      </span>`).join('');

    const subs = t && t.subtasks ? Object.entries(t.subtasks) : [];
    const hasSub = subs.length > 0;
    const subDone = subs.filter(([k,s]) => s && s.done).length;
    const badge = hasSub ? `<span style="font-size:9px;color:var(--text3);margin-left:4px">${subDone}/${subs.length}</span>` : '';
    const safeKey = at.key;
    const toggleBtn = hasSub
      ? `<button onclick="event.stopPropagation();progToggleSub('${safeKey}')" id="stbtn_${safeKey}" style="border:none;background:transparent;cursor:pointer;color:var(--text2);font-size:11px;line-height:1;padding:0 2px">▾</button>`
      : '';

    html += `<tr id="dndrow_${safeKey}" onclick="openProgDetail('${safeKey}')"
      draggable="true"
      ondragstart="dndStart(event,'${safeKey}')"
      ondragover="dndOver(event,'${safeKey}')"
      ondragleave="dndLeave(event,'${safeKey}')"
      ondrop="dndDrop(event,'${safeKey}')"
      style="cursor:pointer${isDone?';opacity:0.5':''}">
      <td onclick="event.stopPropagation();quickDone('${safeKey}')">
        <div class="check ${isDone?'done':''}">${isDone?'✓':''}</div>
      </td>
      <td style="font-size:11px;white-space:nowrap">${t&&t.date?t.date:''}</td>
      <td style="font-weight:${isDone?'400':'500'}">${at.label}${badge}${toggleBtn}</td>
      <td><div style="display:flex;gap:3px;flex-wrap:wrap">${assignees}</div></td>
      <td style="font-size:11px;white-space:nowrap">${t&&t.deadline?t.deadline:''}</td>
      <td style="font-size:11px;white-space:nowrap">${t&&t.doneDate?t.doneDate:''}</td>
      <td><button onclick="event.stopPropagation();openProgDetail('${safeKey}')" style="border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:16px;padding:0">›</button></td>
    </tr>`;

    if (hasSub) {
      subs.forEach(([subKey, s], si) => {
        if (!s) return;
        const sAssignees = Array.isArray(s.parts)
          ? vis.filter(m => s.parts.includes(m.id)).map(m => getMemberAvatar(m, 18)).join('')
          : '';
        html += `<tr class="sub-row subrow_${safeKey}" style="display:none">
          <td style="padding-left:16px">
            <div class="check ${s.done?'done':''}" onclick="progSubToggle('${safeKey}','${subKey}')">${s.done?'✓':''}</div>
          </td>
          <td style="font-size:10px;color:var(--text3);white-space:nowrap">${s.date||''}</td>
          <td style="font-size:11px;color:var(--text2);${s.done?'text-decoration:line-through':''}">↳ ${s.title||''}</td>
          <td><div style="display:flex;gap:2px">${sAssignees}</div></td>
          <td style="font-size:10px;color:var(--text3);white-space:nowrap">${s.deadline||''}</td>
          <td style="font-size:10px;color:var(--text3);white-space:nowrap">${s.doneDate||''}</td>
          <td></td>
        </tr>`;
      });
    }
  }
  tbody.innerHTML = html;
}

function progToggleSub(safeKey) {
  const rows = document.querySelectorAll('.subrow_' + safeKey);
  const btn = document.getElementById('stbtn_' + safeKey);
  if (!rows.length) return;
  const isHidden = rows[0].style.display === 'none';
  rows.forEach(r => { r.style.display = isHidden ? '' : 'none'; });
  if (btn) btn.textContent = isHidden ? '▾' : '▸';
}

function quickDone(atKey) {
  const t = getProgTask(atKey);
  if (t) {
    const newDone = !t.done;
    const doneDate = newDone ? new Date().toISOString().split('T')[0] : '';
    db.ref('tasks/' + t.id).update({ done: newDone, status: newDone ? 'done' : 'notstarted', doneDate });
  } else {
    const at = ANNUAL_TASKS.find(x => x.key === atKey);
    const data = {
      annualKey: atKey,
      progYear: String(progYear),
      title: at ? at.label : '',
      done: true,
      status: 'done',
      doneDate: new Date().toISOString().split('T')[0],
      parts: [],
      subtasks: {}
    };
    db.ref('tasks').push(data);
  }
}

// ── Progress: open new task via + button ──────────────────────────────────────
function openProgNew() {
  // Pick the first unset task, or prompt user
  const unset = ANNUAL_TASKS.filter(at => !getProgTask(at.key));
  if (unset.length === 0) { alert('本年度所有工作均已建立記錄'); return; }
  openProgDetail(unset[0].key);
}

// ── Progress Detail Panel ─────────────────────────────────────────────────────
function openProgDetail(atKey) {
  _detailKey = atKey;
  const t = getProgTask(atKey);
  _detailTaskId = t ? t.id : null;
  const at = ANNUAL_TASKS.find(x => x.key === atKey);

  // Badge
  const badge = document.getElementById('tdCatBadge');
  badge.textContent = waveLabel(progYear);
  badge.style.background = 'var(--bg3)';
  badge.style.color = 'var(--text2)';

  document.getElementById('tdTitle').textContent = at ? at.label : '';
  document.getElementById('tdDate').value = t ? (t.date || '') : '';
  document.getElementById('tdDeadline').value = t ? (t.deadline || '') : '';
  document.getElementById('tdDoneDate').value = t ? (t.doneDate || '') : '';
  document.getElementById('tdStatus').value = t ? (t.status || 'notstarted') : 'notstarted';
  document.getElementById('tdDesc').value = t ? (t.desc || '') : '';

  // Assignees
  const vis = getActiveMembers();
  const selP = t ? (t.parts || []) : [];
  document.getElementById('tdAssignees').innerHTML = vis.map(m => {
    const saved = memberData[m.id] || {};
    const nm = saved.name || m.name;
    const ph = saved.photo;
    const sel = selP.includes(m.id);
    const ring = sel ? 'box-shadow:0 0 0 2.5px var(--accent);' : '';
    const av = ph
      ? `<img src="${ph}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;${ring}">`
      : `<div style="width:36px;height:36px;border-radius:50%;background:${m.bg};color:#555;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;${ring}">${m.initials}</div>`;
    return `<div id="tda_${m.id}" onclick="detailToggleAssignee('${m.id}')" style="display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:${sel?1:0.35}">
      ${av}<span style="font-size:9px;color:var(--text2)">${nm}</span>
    </div>`;
  }).join('');

  renderDetailSubs(t);
  document.getElementById('taskDetailOverlay').classList.add('open');
}

function detailToggleAssignee(mid) {
  const t = _detailTaskId ? tasks.find(x => x.id === _detailTaskId) : null;
  if (!t) {
    // Task doesn't exist yet — need to create it first, then toggle
    ensureProgTask(_detailKey, newT => {
      _detailTaskId = newT.id;
      detailToggleAssigneeOnTask(newT, mid);
    });
    return;
  }
  detailToggleAssigneeOnTask(t, mid);
}

function detailToggleAssigneeOnTask(t, mid) {
  let parts = [...(t.parts || [])];
  const idx = parts.indexOf(mid);
  if (idx >= 0) parts.splice(idx, 1); else parts.push(mid);
  t.parts = parts;
  db.ref('tasks/' + t.id + '/parts').set(parts);
  // Update UI
  getActiveMembers().forEach(m => {
    const el = document.getElementById('tda_' + m.id);
    if (!el) return;
    const sel = parts.includes(m.id);
    el.style.opacity = sel ? '1' : '0.35';
    const img = el.querySelector('img,div');
    if (img) {
      img.style.boxShadow = sel ? '0 0 0 2.5px var(--accent)' : '';
    }
  });
}

function renderDetailSubs(task) {
  const el = document.getElementById('tdSubtasks');
  if (!el) return;
  const subs = task && task.subtasks ? Object.entries(task.subtasks) : [];
  if (!subs.length) {
    el.innerHTML = '<div style="font-size:11px;color:var(--text3)">尚無子計畫</div>';
    return;
  }
  const vis = getActiveMembers();
  el.innerHTML = subs.map(([subKey, s], i) => `
    <div style="padding:8px 10px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:6px">
        <div class="check ${s.done?'done':''}" onclick="progSubToggle('${_detailKey}','${subKey}');renderDetailSubs(getProgTask('${_detailKey}'))">${s.done?'✓':''}</div>
        <span style="flex:1;font-size:12px;font-weight:500;${s.done?'text-decoration:line-through;color:var(--text3)':''}">${s.title||''}</span>
        <button onclick="deleteDetailSub('${subKey}')" style="border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:13px">✕</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;padding-left:22px">
        <div>
          <div class="flabel" style="font-size:9px">日期</div>
          <input type="date" value="${s.date||''}" onchange="updateSubField('${subKey}','date',this.value)" style="font-size:11px;padding:3px 6px">
        </div>
        <div>
          <div class="flabel" style="font-size:9px">Deadline</div>
          <input type="date" value="${s.deadline||''}" onchange="updateSubField('${subKey}','deadline',this.value)" style="font-size:11px;padding:3px 6px">
        </div>
        <div>
          <div class="flabel" style="font-size:9px">完成日期</div>
          <input type="date" value="${s.doneDate||''}" onchange="updateSubField('${subKey}','doneDate',this.value)" style="font-size:11px;padding:3px 6px">
        </div>
        <div>
          <div class="flabel" style="font-size:9px">負責人</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">
            ${vis.map(m => {
              const sel = s.parts && s.parts.includes(m.id);
              return `<span onclick="toggleSubMember('${subKey}','${m.id}')" style="cursor:pointer;opacity:${sel?1:0.35}">${getMemberAvatar(m, 22)}</span>`;
            }).join('')}
          </div>
        </div>
      </div>
    </div>`).join('');
}

function updateSubField(subKey, field, val) {
  const t = _detailTaskId ? tasks.find(x => x.id === _detailTaskId) : null;
  if (!t || !t.subtasks || !t.subtasks[subKey]) return;
  t.subtasks[subKey][field] = val;
  db.ref(`tasks/${t.id}/subtasks/${subKey}/${field}`).set(val);
}

function toggleSubMember(subKey, mid) {
  const t = _detailTaskId ? tasks.find(x => x.id === _detailTaskId) : null;
  if (!t || !t.subtasks || !t.subtasks[subKey]) return;
  const sub = t.subtasks[subKey];
  let parts = [...(sub.parts || [])];
  const idx = parts.indexOf(mid);
  if (idx >= 0) parts.splice(idx, 1); else parts.push(mid);
  sub.parts = parts;
  db.ref(`tasks/${t.id}/subtasks/${subKey}/parts`).set(parts)
    .then(() => renderDetailSubs(t));
}

function addSubtask() {
  const title = prompt('子計畫名稱：');
  if (!title) return;
  const newSub = { title, done: false, date: '', deadline: '', doneDate: '', parts: [], createdAt: new Date().toISOString() };
  ensureProgTask(_detailKey, t => {
    db.ref(`tasks/${t.id}/subtasks`).push(newSub).then(() => {
      db.ref(`tasks/${t.id}`).once('value', snap => {
        const updated = { id: t.id, ...snap.val() };
        const idx = tasks.findIndex(x => x.id === t.id);
        if (idx >= 0) tasks[idx] = updated; else tasks.push(updated);
        _detailTaskId = t.id;
        renderDetailSubs(updated);
        renderProgContent();
      });
    });
  });
}

function progSubToggle(atKey, subKey) {
  const t = getProgTask(atKey);
  if (!t || !t.subtasks || !t.subtasks[subKey]) return;
  const cur = t.subtasks[subKey].done;
  db.ref(`tasks/${t.id}/subtasks/${subKey}/done`).set(!cur).then(() => {
    t.subtasks[subKey].done = !cur;
    renderDetailSubs(t);
    renderProgContent();
  });
}

function deleteDetailSub(subKey) {
  if (!confirm('確定刪除子計畫？')) return;
  const t = _detailTaskId ? tasks.find(x => x.id === _detailTaskId) : null;
  if (!t || !t.subtasks) return;
  db.ref(`tasks/${t.id}/subtasks/${subKey}`).remove().then(() => {
    delete t.subtasks[subKey];
    renderDetailSubs(t);
    renderProgContent();
  });
}

function saveTaskDetail() {
  const at = ANNUAL_TASKS.find(x => x.key === _detailKey);
  const status = document.getElementById('tdStatus').value;
  const data = {
    annualKey: _detailKey,
    progYear: String(progYear),
    title: at ? at.label : '',
    date: document.getElementById('tdDate').value,
    deadline: document.getElementById('tdDeadline').value,
    doneDate: document.getElementById('tdDoneDate').value,
    status,
    desc: document.getElementById('tdDesc').value,
    done: status === 'done',
  };
  const t = _detailTaskId ? tasks.find(x => x.id === _detailTaskId) : null;
  if (t) {
    data.parts = t.parts || [];
    data.subtasks = t.subtasks || {};
    db.ref('tasks/' + _detailTaskId).update(data).then(() => {
      Object.assign(t, data);
      renderProgContent();
      closeTaskDetail();
    });
  } else {
    data.parts = [];
    data.subtasks = {};
    db.ref('tasks').push(data).then(ref => {
      tasks.push({ id: ref.key, ...data });
      _detailTaskId = ref.key;
      renderProgContent();
      closeTaskDetail();
    });
  }
}

// ── DELETE current task from detail panel ─────────────────────────────────────
function deleteCurrentTask() {
  // Re-fetch in case _detailKey changed
  const fresh = _detailKey ? getProgTask(_detailKey) : null;
  if (fresh) _detailTaskId = fresh.id;

  if (!_detailTaskId) {
    // No Firebase record → nothing to delete
    closeTaskDetail();
    return;
  }
  if (!confirm('確定要刪除此工作的所有資料（包含子計畫）？')) return;

  const idToDelete = _detailTaskId;
  db.ref('tasks/' + idToDelete).remove()
    .then(() => {
      tasks = tasks.filter(x => x.id !== idToDelete);
      _detailTaskId = null;
      closeTaskDetail();
      renderProgContent();
    })
    .catch(err => {
      alert('刪除失敗：' + err.message);
    });
}

function closeTaskDetail() { document.getElementById('taskDetailOverlay').classList.remove('open'); }

// ── Ensure prog task exists ───────────────────────────────────────────────────
function ensureProgTask(atKey, cb) {
  let t = getProgTask(atKey);
  if (t) { cb(t); return; }
  const at = ANNUAL_TASKS.find(x => x.key === atKey);
  const data = {
    annualKey: atKey,
    progYear: String(progYear),
    title: at ? at.label : '',
    done: false,
    status: 'notstarted',
    parts: [],
    subtasks: {}
  };
  db.ref('tasks').push(data).then(ref => {
    const newT = { id: ref.key, ...data };
    tasks.push(newT);
    cb(newT);
  });
}

// ── Drag and Drop (A→B makes A a subtask of B) ────────────────────────────────
function dndStart(ev, atKey) {
  _dndSrc = atKey;
  ev.dataTransfer.effectAllowed = 'move';
  ev.dataTransfer.setData('text/plain', atKey);
}

function dndOver(ev, atKey) {
  if (atKey === _dndSrc) return;
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'move';
  const row = document.getElementById('dndrow_' + atKey);
  if (row) row.classList.add('dnd-over');
}

function dndLeave(ev, atKey) {
  const row = document.getElementById('dndrow_' + atKey);
  if (row) row.classList.remove('dnd-over');
}

function dndDrop(ev, targetKey) {
  ev.preventDefault();
  document.querySelectorAll('.dnd-over').forEach(r => r.classList.remove('dnd-over'));
  const srcKey = _dndSrc;
  _dndSrc = null;
  if (!srcKey || srcKey === targetKey) return;

  const srcAt = ANNUAL_TASKS.find(x => x.key === srcKey);
  const srcLabel = srcAt ? srcAt.label : srcKey;
  if (!confirm(`確定將「${srcLabel}」變成目標工作的子計畫？此操作無法還原。`)) return;

  const srcTask = getProgTask(srcKey);

  // Build subtask object from source task
  const sub = {
    title: srcLabel,
    done: srcTask ? (srcTask.done || false) : false,
    date: srcTask ? (srcTask.date || '') : '',
    deadline: srcTask ? (srcTask.deadline || '') : '',
    doneDate: srcTask ? (srcTask.doneDate || '') : '',
    parts: srcTask ? (srcTask.parts || []) : [],
    createdAt: new Date().toISOString()
  };

  ensureProgTask(targetKey, targetTask => {
    // Push sub to target
    db.ref('tasks/' + targetTask.id + '/subtasks').push(sub).then(() => {
      // Delete source task from Firebase if it existed
      if (srcTask) {
        db.ref('tasks/' + srcTask.id).remove().then(() => {
          tasks = tasks.filter(x => x.id !== srcTask.id);
          renderProgContent();
        });
      } else {
        renderProgContent();
      }
    });
  });
}

function openAddOnDate(ds) {

}

  const cat = document.getElementById('iCat');
  cat.value = t.cat || 'data';

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function updateCatColor(sel) {

function renderProgYearSelect(selectedYear) {

}

function renderModalMembers() {
  const vis = getActiveMembers();
  document.getElementById('creatorChips').innerHTML = vis.map(m => {
    const saved = memberData[m.id] || {};
    const photo = saved.photo;
    const isSel = m.id === selCreator;
    const ring = isSel ? 'box-shadow:0 0 0 2.5px var(--accent);' : '';
    const av = photo
      ? `<img src="${photo}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;${ring}">`
      : `<div style="width:32px;height:32px;border-radius:50%;background:${m.bg};color:#555;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;${ring}">${m.initials}</div>`;
    return `<div onclick="selCreator='${m.id}';renderModalMembers()" style="cursor:pointer;opacity:${isSel?1:0.4}">${av}</div>`;
  }).join('');

  document.getElementById('partChips').innerHTML = vis.map(m => {
    const saved = memberData[m.id] || {};
    const name = saved.name || m.name;
    const photo = saved.photo;

    const ring = sel ? 'box-shadow:0 0 0 2.5px var(--accent);' : '';
    const av = photo
      ? `<img src="${photo}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;${ring}">`
      : `<div style="width:40px;height:40px;border-radius:50%;background:${m.bg};color:#555;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;${ring}">${m.initials}</div>`;
    return `<div onclick="(function(){const i=selParts.indexOf('${m.id}');i>=0?selParts.splice(i,1):selParts.push('${m.id}');renderModalMembers();})()" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;opacity:${sel?1:0.4}">
      ${av}<span style="font-size:9px;color:var(--text2);white-space:nowrap">${name}</span>
    </div>`;
  }).join('');
}

function saveTask() {
  const title = document.getElementById('iTitle').value.trim();
  if (!title) { alert('請輸入工作名稱'); return; }
  const h = document.getElementById('iTimeH').value;
  const m = document.getElementById('iTimeM').value;
  const dh = document.getElementById('iDeadlineH').value;
  const dm = document.getElementById('iDeadlineM').value;
  const selProgYear = document.getElementById('iProgYear').value || String(progYear);
  const data = {
    title,
    desc: document.getElementById('iDesc').value,
    date: document.getElementById('iDate').value,
    time: `${h}:${m}`,
    deadline: document.getElementById('iDeadline').value,
    deadlineTime: `${dh}:${dm}`,
    cat: document.getElementById('iCat').value,
    urgency: document.getElementById('iUrgency').value,
    status: editingId ? (tasks.find(x=>x.id===editingId)?.status||'notstarted') : 'notstarted',
    creator: selCreator,
    parts: [...selParts],
    done: editingId ? (tasks.find(x=>x.id===editingId)?.done||false) : false,
    progYear: selProgYear,
    timestamp: new Date().toISOString()
  };
  if (editingId) {
    db.ref('tasks/' + editingId).update(data);
  } else {
    db.ref('tasks').push(data);
  }
  closeModal();
}

function deleteEditingTask() {
  if (!editingId) return;
  if (!confirm('確定要刪除？')) return;
  db.ref('tasks/' + editingId).remove();
  closeModal();
}

// ── Sidebar / Navigation ──────────────────────────────────────────────────────
function toggleSidebar() {
  const sb = document.getElementById('mainSidebar');
  if (!sb) return;
  sb.classList.toggle('collapsed');
}

function switchView(v, el) {
  document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
  const target = document.getElementById('view-' + v);
  if (target) target.classList.add('active');
  document.querySelectorAll('.sb-item').forEach(x => x.classList.remove('active'));
  if (el) el.classList.add('active');
  if (v === 'progress') renderProgContent();
  else if (v === 'dashboard') { renderCalendar(); renderDashSidebar(); }
}

// ── Init ──────────────────────────────────────────────────────────────────────
initProgTabs();
renderCalendar();
</script>
</body>
</html>
