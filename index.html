<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIGPS 研究計畫平台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f7;--bg2:#f1ede8;--bg3:#e8e3db;
  --text:#5a5651;--text2:#8b8580;--text3:#b4ada5;
  --border:#e3dcd4;--border2:#d4ccc2;
  --blue-bg:#e5e7e6;--blue-text:#6b7171;
  --green-bg:#e5e8e3;--green-text:#6f8070;
  --red-bg:#e8e0dd;--red-text:#8a6b66;
  --orange-bg:#e8e0d8;--orange-text:#8a7460;
  --purple-bg:#e5e3e8;--purple-text:#726b7f;
  --pink-bg:#e8dfe3;--pink-text:#806070;
  --teal-bg:#dfe5e3;--teal-text:#5f7070;
  --yellow-bg:#e8e5d8;--yellow-text:#8a7d60;
  --accent:#6b7171;
  --radius:8px;--radius-lg:12px;
}
html{background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;min-width:240px;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;overflow:hidden;padding:16px 12px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Sidebar */
.sb-logo{padding:0 0 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sb-logo-icon{width:32px;height:32px;background:var(--text);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--bg);font-size:13px;font-weight:700;flex-shrink:0}
.sb-logo-text{font-size:16px;font-weight:600;color:var(--text)}
.sb-nav{flex:1;overflow-y:auto;padding:12px 0;margin-top:12px}
.sb-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;margin-bottom:2px;user-select:none}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--border);color:var(--text);font-weight:500}
.sb-icon{width:18px;height:18px;flex-shrink:0;opacity:0.6}
.sb-team{padding:12px 0;border-top:1px solid var(--border);margin-top:auto}
.team-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.member-cell{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:default}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.avatar-sm{width:18px;height:18px;font-size:8px;font-weight:600;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.member-name{font-size:9px;color:var(--text2);text-align:center;line-height:1.2}

/* Topbar */
.topbar{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0;min-height:52px}
.topbar-title{font-size:18px;font-weight:600;flex:1;color:var(--text)}
.topbar-actions{display:flex;align-items:center;gap:6px}
.add-round{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text2);line-height:1}
.add-round:hover{background:var(--bg2);color:var(--text)}

/* Content */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.view{display:none;flex:1;overflow:hidden}
.view.active{display:flex;flex-direction:column}

/* === CALENDAR VIEW === */
.cal-wrap{display:flex;flex:1;overflow:hidden}
.cal-left{width:200px;min-width:200px;border-right:1px solid var(--border);padding:14px;overflow-y:auto;background:var(--bg2);display:flex;flex-direction:column;gap:12px}
.cal-center{flex:1;display:flex;flex-direction:column;overflow-y:auto;min-height:0}
.cal-right{width:200px;min-width:200px;border-left:1px solid var(--border);padding:14px;overflow-y:auto;background:var(--bg2)}

.cal-side-section{display:flex;flex-direction:column;gap:6px}
.cal-side-title{font-size:10px;font-weight:700;padding:4px 8px;border-radius:4px;display:inline-block;text-transform:uppercase;letter-spacing:0.05em}
.cal-side-title.current{background:var(--blue-bg);color:var(--blue-text)}
.cal-side-title.next{background:var(--orange-bg);color:var(--orange-text)}
.cal-side-title.deadline{background:var(--red-bg);color:var(--red-text)}
.cal-side-title.meeting{background:var(--teal-bg);color:var(--teal-text)}
.cal-side-item{font-size:11px;padding:5px 7px;border-radius:4px;color:var(--text2);cursor:pointer;display:flex;align-items:flex-start;gap:4px;transition:all 0.2s}
.cal-side-item:hover{background:var(--border);color:var(--text)}
.cal-side-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:3px}

.cal-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
.cal-month-year{text-align:center;flex:1}
.cal-nav-title{font-size:20px;font-weight:600;color:var(--text)}
.cal-nav-year{font-size:13px;color:var(--text2);margin-top:2px}
.arrow-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:15px;transition:all 0.2s}
.arrow-btn:hover{background:var(--bg2);color:var(--text)}
.cal-today-btn{padding:4px 12px;font-size:11px;border-radius:var(--radius);border:1.5px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);transition:all 0.2s;font-weight:500}
.cal-today-btn:hover{background:var(--bg2);color:var(--text)}

.cal-grid{padding:12px;display:flex;flex-direction:column;gap:0}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:1px;margin-bottom:1px;background:var(--border)}
.cal-dow{font-size:10px;color:var(--text3);text-align:center;font-weight:600;padding:6px 0;background:var(--bg)}
.cal-body{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:1px;background:var(--border);flex:1}
.cal-cell{min-height:100px;padding:6px;cursor:pointer;background:var(--bg);vertical-align:top;overflow:hidden;display:flex;flex-direction:column}
.cal-cell:hover{background:var(--bg2)}
.cal-cell.other-month{background:var(--bg3);opacity:0.6}
.cal-cell.weekend .cal-date-num{color:#c97070}
.cal-cell.holiday{background:#f5ebe0}
.cal-cell.holiday .cal-date-num{color:#c97070;font-weight:600}
.cal-date-num{font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:500;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-date-num.today{background:var(--accent);color:var(--bg);font-weight:600}
.cal-chip{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:2px;cursor:pointer;line-height:1.2}
.cal-chip:hover{opacity:0.8}
.cal-more{font-size:9px;color:var(--text3);padding:1px 3px}

/* Task List View */
.tab-header{display:flex;gap:2px;background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;flex-shrink:0}
.tab{padding:8px 16px;font-size:12px;border-radius:var(--radius);border:none;background:transparent;cursor:pointer;color:var(--text2);font-weight:500;transition:all 0.2s}
.tab:hover{background:var(--bg3);color:var(--text)}
.tab.active{background:var(--border);color:var(--text)}
.task-toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.filter-chip{padding:4px 12px;font-size:11px;border-radius:12px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;color:var(--text2);transition:all 0.2s;font-weight:500}
.filter-chip:hover{background:var(--bg2)}
.filter-chip.active{border-color:var(--accent);background:var(--blue-bg);color:var(--blue-text)}
.table-wrap{flex:1;overflow:auto;padding:0}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:2;white-space:nowrap}
.data-table td{padding:7px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tr:hover td{background:var(--bg2)}
.data-table tr.done-row td{opacity:0.4}
.sort-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:11px;font-weight:600;display:flex;align-items:center;gap:3px;padding:0}
.sort-btn:hover{color:var(--text)}
.check-cell{width:32px;text-align:center}
.check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;background:transparent}
.check.done{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.priority-cell{text-align:center}
.avatars-stack{display:flex;align-items:center}
.avatars-stack .avatar-sm{margin-left:-5px;border:1.5px solid var(--bg)}
.avatars-stack .avatar-sm:first-child{margin-left:0}
.task-title-cell{font-size:13px;font-weight:500;cursor:pointer;max-width:280px;color:var(--text)}
.task-title-cell.done{text-decoration:line-through;color:var(--text3)}
.task-title-cell:hover{color:var(--accent)}

/* Status & priority badges */
.status{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500}
.st-notstarted{background:var(--bg3);color:var(--text2)}
.st-inprogress{background:var(--blue-bg);color:var(--blue-text)}
.st-done{background:var(--green-bg);color:var(--green-text)}
.st-blocked{background:var(--red-bg);color:var(--red-text)}
.priority{display:inline-flex;gap:2px;font-size:11px}
.p1{color:#8a6b66}.p2{color:#8a7460}.p3{color:#8a8570}

/* Type tags */
.tag{display:inline-flex;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:500}
.tag-questionnaire{background:var(--purple-bg);color:var(--purple-text)}
.tag-data{background:var(--blue-bg);color:var(--blue-text)}
.tag-admin{background:var(--orange-bg);color:var(--orange-text)}
.tag-meeting{background:var(--teal-bg);color:var(--teal-text)}
.tag-platform{background:var(--pink-bg);color:var(--pink-text)}

/* Questionnaire type tags */
.qtag{display:inline-flex;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:500}
.qt-student{background:#dfe5e0;color:#5f7060}
.qt-sibling{background:#e8dfe0;color:#805f5f}
.qt-parent{background:#dfe0e5;color:#5f6070}
.qt-teacher{background:#e8dfe5;color:#80606f}
.qt-subject{background:#e5dfe0;color:#80706f}
.qt-school{background:#dfe5e0;color:#5f7060}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);width:520px;max-height:88vh;overflow-y:auto;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.08)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:600}
.close-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);font-size:14px;display:flex;align-items:center;justify-content:center}
.close-btn:hover{background:var(--bg2)}
.fg{margin-bottom:14px}
.flabel{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.05em}
input[type=text],input[type=date],select,textarea{width:100%;padding:7px 10px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--bg2)}
textarea{resize:vertical;min-height:60px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chip-row{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:4px 10px;font-size:11px;border-radius:12px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);transition:all 0.2s}
.chip:hover{background:var(--bg2)}
.chip.on{border-color:var(--accent);background:var(--blue-bg);color:var(--blue-text)}
.chip.on-student{background:#dfe5e0;color:#5f7060;border-color:#afc5a0}
.chip.on-sibling{background:#e8dfe0;color:#805f5f;border-color:#d0b0a0}
.chip.on-parent{background:#dfe0e5;color:#5f6070;border-color:#b0a0d0}
.chip.on-teacher{background:#e8dfe5;color:#80606f;border-color:#d0a0c0}
.chip.on-subject{background:#e5dfe0;color:#80706f;border-color:#d0b0a0}
.chip.on-school{background:#dfe5e0;color:#5f7060;border-color:#afc5a0}
.mem-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;font-size:11px;border-radius:12px;border:1px solid var(--border2);cursor:pointer;color:var(--text2);transition:all 0.2s}
.mem-chip:hover{background:var(--bg2)}
.mem-chip.sel{border-color:var(--accent);background:var(--blue-bg);color:var(--blue-text)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.priority-display{display:flex;gap:3px}
.pstar{font-size:13px;cursor:pointer;color:var(--border2);transition:color 0.2s}
.pstar.on{color:#8a6b66}
.btn{padding:6px 14px;font-size:12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:5px;line-height:1.4;transition:all 0.2s}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.btn-primary:hover{background:#5a6161}

/* Progress bar */
.prog-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:var(--accent)}

/* Detail panel */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:90;align-items:flex-start;justify-content:flex-end}
.detail-overlay.open{display:flex}
.detail-panel{width:420px;height:100vh;background:var(--bg);border-left:1px solid var(--border);overflow-y:auto;padding:24px;box-shadow:-4px 0 20px rgba(0,0,0,0.08)}
.detail-panel-title{font-size:17px;font-weight:600;margin-bottom:4px;color:var(--text)}
.detail-field{margin-bottom:14px}
.detail-field-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.detail-field-val{font-size:13px;color:var(--text)}
.notes-input{width:100%;padding:8px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);resize:vertical;min-height:80px;font-family:inherit}
.notes-input:focus{outline:none;border-color:var(--accent);background:var(--bg2)}

.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.divider{height:1px;background:var(--border);margin:8px 0}
</style>
</head>
<body>

<div class="app">

<!-- Sidebar -->
<div class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-icon">T</div>
    <div class="sb-logo-text">TIGPS</div>
  </div>
  <div class="sb-nav">
    <div class="sb-item active" onclick="switchView('dashboard',this)">
      <svg class="sb-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="2" width="6" height="6" rx="1"/><rect x="10" y="2" width="6" height="6" rx="1"/><rect x="2" y="10" width="6" height="6" rx="1"/><rect x="10" y="10" width="6" height="6" rx="1"/></svg>
      總覽
    </div>
    <div class="sb-item" onclick="switchView('tasks',this)">
      <svg class="sb-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 5h14M2 9h10M2 13h7"/></svg>
      代辦工作
    </div>
  </div>
  <div class="sb-team">
    <div style="font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px">研究團隊</div>
    <div class="team-grid" id="teamGrid"></div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbarTitle">總覽</div>
    <div class="topbar-actions">
      <button class="add-round" onclick="openAdd()" title="新增工作">＋</button>
    </div>
  </div>
  <div class="content">

    <!-- DASHBOARD VIEW -->
    <div class="view active" id="view-dashboard">
      <div class="cal-wrap">
        <!-- Left panel -->
        <div class="cal-left">
          <div class="cal-side-section">
            <div class="cal-side-title current">當月代辦</div>
            <div id="dashCurrentMonth"></div>
          </div>
          <div class="cal-side-section">
            <div class="cal-side-title next">次月代辦</div>
            <div id="dashNextMonth"></div>
          </div>
        </div>
        <!-- Center calendar -->
        <div class="cal-center">
          <div class="cal-nav">
            <button class="arrow-btn" onclick="changeCalMonth(-1)">‹</button>
            <div class="cal-month-year">
              <div class="cal-nav-title" id="calMonthTitle"></div>
              <div class="cal-nav-year" id="calYearLabel"></div>
            </div>
            <button class="arrow-btn" onclick="changeCalMonth(1)">›</button>
            <button class="cal-today-btn" onclick="goToday()">今天</button>
          </div>
          <div class="cal-grid">
            <div class="cal-dow-row">
              <div class="cal-dow">日</div><div class="cal-dow">一</div><div class="cal-dow">二</div>
              <div class="cal-dow">三</div><div class="cal-dow">四</div><div class="cal-dow">五</div><div class="cal-dow">六</div>
            </div>
            <div class="cal-body" id="calBody"></div>
          </div>
        </div>
        <!-- Right panel -->
        <div class="cal-right">
          <div class="cal-side-section">
            <div class="cal-side-title deadline" style="display:block;margin-bottom:6px">重要事項</div>
            <div id="dashDeadlines"></div>
          </div>
          <div class="divider" style="margin:8px 0"></div>
          <div class="cal-side-section">
            <div class="cal-side-title meeting" style="display:block;margin-bottom:6px">會議</div>
            <div id="dashMeetings"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- TASK LIST VIEW -->
    <div class="view" id="view-tasks">
      <div class="tab-header">
        <button class="tab active" onclick="switchTab('list',this)">列表</button>
        <button class="tab" onclick="switchTab('progress',this)">進度</button>
      </div>
      <div id="taskListPanel" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
        <div class="task-toolbar">
          <span style="font-size:11px;color:var(--text2)">分類：</span>
          <button class="filter-chip active" id="fl-all" onclick="setTaskFilter('all',this)">全部</button>
          <button class="filter-chip" id="fl-questionnaire" onclick="setTaskFilter('questionnaire',this)">問卷</button>
          <button class="filter-chip" id="fl-data" onclick="setTaskFilter('data',this)">資料</button>
          <button class="filter-chip" id="fl-admin" onclick="setTaskFilter('admin',this)">行政</button>
          <button class="filter-chip" id="fl-meeting" onclick="setTaskFilter('meeting',this)">會議</button>
          <button class="filter-chip" id="fl-platform" onclick="setTaskFilter('platform',this)">平台</button>
          <div style="margin-left:auto"><button class="add-round" onclick="openAdd()">＋</button></div>
        </div>
        <div class="table-wrap">
          <table class="data-table" id="taskTable">
            <thead>
              <tr>
                <th class="check-cell"></th>
                <th><button class="sort-btn" onclick="sortTasks('title')">討論主題 ↕</button></th>
                <th><button class="sort-btn" onclick="sortTasks('date')">日期 ↕</button></th>
                <th>人員</th>
                <th><button class="sort-btn" onclick="sortTasks('priority')">緊急程度 ↕</button></th>
                <th><button class="sort-btn" onclick="sortTasks('status')">狀態 ↕</button></th>
                <th>類型</th>
                <th>備註</th>
              </tr>
            </thead>
            <tbody id="taskTbody"></tbody>
          </table>
        </div>
      </div>
      <div id="progressPanel" style="flex:1;overflow-y:auto;padding:20px;display:none">
        <div style="margin-bottom:24px">
          <div style="font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text)">各年度完成率</div>
          <div id="yearProg"></div>
        </div>
        <div>

<script>

const TW_HOLIDAYS_2025={
  '2025-01-01':true,'2025-02-08':true,'2025-02-09':true,'2025-02-10':true,'2025-02-28':true,

const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
let calYear=new Date().getFullYear();
let calMonth=new Date().getMonth();

let selCreator='m1';

let currentTab='list';

let tasks=[
  {id:1,title:'W2資料釋出',desc:'',date:'2026-03-31',deadline:'2026-03-31',cat:'data',status:'notstarted',priority:3,qtags:[],creator:'m1',parts:['m1'],notes:''},
  {id:2,title:'W3資料釋出',desc:'',date:'2026-06-19',deadline:'2026-06-19',cat:'data',status:'notstarted',priority:3,qtags:[],creator:'m1',parts:['m1'],notes:''},
  {id:3,title:'第三屆研討會',desc:'',date:'2026-06-11',deadline:'2026-06-13',cat:'meeting',status:'notstarted',priority:3,qtags:[],creator:'m1',parts:['m1','m2'],notes:''},
  {id:4,title:'說明會邀請',desc:'',date:'2026-05-11',deadline:'',cat:'meeting',status:'notstarted',priority:3,qtags:[],creator:'m2',parts:['m2'],notes:''},

  {id:6,title:'預計W4調查開始',desc:'',date:'2026-05-18',deadline:'',cat:'questionnaire',status:'notstarted',priority:3,qtags:['student','sibling','parent','teacher','subject','school'],creator:'m1',parts:['m1','m2','m3','m4'],notes:''},
  {id:7,title:'W4問卷上架',desc:'',date:'2026-05-04',deadline:'',cat:'data',status:'notstarted',priority:3,qtags:[],creator:'m4',parts:['m4'],notes:''},

  {id:11,title:'紅包活動',desc:'',date:'2026-02-06',deadline:'2026-03-08',cat:'platform',status:'notstarted',priority:1,qtags:[],creator:'m2',parts:['m2'],notes:''},

const gm=id=>MEMBERS.find(m=>m.id===id);
const today=new Date();
today.setHours(0,0,0,0);

function isWeekend(d){const dow=new Date(d).getDay();return dow===0||dow===6}
function isHoliday(ds){return TW_HOLIDAYS[ds]}

function avatarHtml(m,size){
  const s=size||18;
  return `<div class="avatar-sm" style="width:${s}px;height:${s}px;font-size:${Math.round(s*0.45)}px;background:${m.bg};color:${m.color}" title="${m.name}">${m.initials}</div>`;
}
function priorityHtml(p){
  const marks=Array.from({length:3},(_,i)=>`<span style="color:${i<p?'#8a6b66':'#d4ccc2'};font-size:12px">!</span>`).join('');
  return `<span class="priority">${marks}</span>`;
}
function statusHtml(s){
  const si=STATUS_INFO[s]||STATUS_INFO.notstarted;
  return `<span class="status ${si.cls}">${si.label}</span>`;
}
function tagHtml(cat){
  const ci=CAT_INFO[cat]||CAT_INFO.admin;
  return `<span class="tag ${ci.chipCls}">${ci.label}</span>`;
}
function qtagHtml(q){
  const qi=QTAG_INFO[q];
  return qi?`<span class="qtag ${qi.cls}">${qi.label}</span>`:'';
}

function renderTeam(){
  document.getElementById('teamGrid').innerHTML=MEMBERS.map(m=>`
    <div class="member-cell">
      <div class="avatar" style="background:${m.bg};color:${m.color}">${m.initials}</div>
      <div class="member-name">${m.name}</div>
    </div>`).join('');
}

function renderCalendar(){
  const tEl=document.getElementById('calMonthTitle');
  const yEl=document.getElementById('calYearLabel');
  const bEl=document.getElementById('calBody');
  tEl.textContent=MONTHS[calMonth];
  yEl.textContent=calYear+'年';

  const first=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0).getDate();
  const startDow=first.getDay();
  const monthStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const monthTasks=tasks.filter(t=>t.date&&t.date.startsWith(monthStr));

  let cells='';
  for(let i=0;i<startDow;i++)cells+=`<div class="cal-cell empty" style="background:transparent;border:none"></div>`;
  for(let d=1;d<=lastDay;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt=monthTasks.filter(t=>t.date===ds);
    const isT=new Date(calYear,calMonth,d).getTime()===today.getTime();
    const numCls=isT?'cal-date-num today':'cal-date-num';
    const cellCls=isWeekend(ds)?'weekend':'';
    const holidayCls=isHoliday(ds)?'holiday':'';
    let chips=dt.slice(0,3).map(t=>{
      const cr=gm(t.creator);
      const st=CAL_CHIP_STYLE[t.cat]||'background:#e5e5e5;color:#777';
      return `<div class="cal-chip" style="${st}" onclick="openDetail(${t.id});event.stopPropagation()">${cr?`<div style="width:10px;height:10px;border-radius:50%;background:${cr.bg};color:${cr.color};font-size:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${cr.initials}</div>`:''}${t.title}</div>`;
    }).join('');
    const more=dt.length>3?`<div class="cal-more">+${dt.length-3}</div>`:'';
    cells+=`<div class="cal-cell ${cellCls} ${holidayCls}" onclick="openAddOnDate('${ds}')">${'<div class="'+numCls+'">'+d+'</div>'}${chips}${more}</div>`;
  }
  const total=startDow+lastDay;
  const rem=(7-total%7)%7;
  for(let i=0;i<rem;i++)cells+=`<div class="cal-cell empty" style="background:transparent;border:none"></div>`;
  bEl.innerHTML=cells;

  renderDashSidebar();
}

function changeCalMonth(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++}
  if(calMonth<0){calMonth=11;calYear--}
  renderCalendar();
}
function goToday(){
  calYear=new Date().getFullYear();
  calMonth=new Date().getMonth();
  renderCalendar();
}

function renderDashSidebar(){
  const now=new Date();
  const curY=now.getFullYear(),curM=now.getMonth();
  const nextY=curM===11?curY+1:curY,nextM=curM===11?0:curM+1;
  const curStr=`${curY}-${String(curM+1).padStart(2,'0')}`;
  const nextStr=`${nextY}-${String(nextM+1).padStart(2,'0')}`;

  const cur=tasks.filter(t=>t.date&&t.date.startsWith(curStr)&&t.status!=='done');
  const nxt=tasks.filter(t=>t.date&&t.date.startsWith(nextStr)&&t.status!=='done');
  const dl=tasks.filter(t=>t.deadline&&t.priority===3&&t.status!=='done').sort((a,b)=>a.deadline.localeCompare(b.deadline)).slice(0,5);
  const mtg=tasks.filter(t=>t.cat==='meeting'&&t.date&&t.date>=curStr).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);

  const renderSideItem=(t,dotColor)=>`<div class="cal-side-item" onclick="openDetail(${t.id})"><div class="cal-side-dot" style="background:${dotColor}"></div><div><div style="font-size:11px">${t.title}</div><div style="font-size:10px;color:var(--text3)">${t.date||t.deadline||''}</div></div></div>`;

  document.getElementById('dashCurrentMonth').innerHTML=cur.length?cur.map(t=>renderSideItem(t,'#8a6b66')).join(''):`<div style="font-size:11px;color:var(--text3);padding:4px 6px">無</div>`;
  document.getElementById('dashNextMonth').innerHTML=nxt.length?nxt.map(t=>renderSideItem(t,'#8a7460')).join(''):`<div style="font-size:11px;color:var(--text3);padding:4px 6px">無</div>`;
  document.getElementById('dashDeadlines').innerHTML=dl.length?dl.map(t=>renderSideItem(t,'#c97070')).join(''):`<div style="font-size:11px;color:var(--text3);padding:4px 6px">無</div>`;
  document.getElementById('dashMeetings').innerHTML=mtg.length?mtg.map(t=>`<div class="cal-side-item" onclick="openDetail(${t.id})"><div class="cal-side-dot" style="background:#5f7070"></div><div><div style="font-size:11px">${t.title}</div><div style="font-size:10px;color:var(--text3)">${t.date||''}</div></div></div>`).join(''):`<div style="font-size:11px;color:var(--text3);padding:4px 6px">無</div>`;
}

function renderTaskList(){
  let filtered=taskFilter==='all'?[...tasks]:tasks.filter(t=>t.cat===taskFilter);
  filtered.sort((a,b)=>{
    let va=a[sortKey]||'',vb=b[sortKey]||'';
    if(sortKey==='priority'){va=a.priority;vb=b.priority}
    if(sortKey==='status'){va=a.status;vb=b.status}
    return sortAsc?(va>vb?1:-1):(va<vb?1:-1);
  });
  document.getElementById('taskTbody').innerHTML=filtered.map(t=>{
    const cr=gm(t.creator);
    const pts=(t.parts||[]).map(gm).filter(Boolean);
    const si=STATUS_INFO[t.status]||STATUS_INFO.notstarted;
    return `<tr class="${t.done?'done-row':''}">
      <td class="check-cell"><div class="check ${t.done?'done':''}" onclick="toggleTask(${t.id})">${t.done?'✓':''}</div></td>
      <td><div class="task-title-cell ${t.done?'done':''}" onclick="openDetail(${t.id})">${t.title}</div>${t.qtags&&t.qtags.length?'<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:3px">'+t.qtags.map(qtagHtml).join('')+'</div>':''}</td>
      <td style="white-space:nowrap"><div style="font-size:12px;color:var(--text2)">${t.date||''}</div>${t.deadline&&t.deadline!==t.date?`<div style="font-size:11px;color:#8a6b66">→${t.deadline}</div>`:''}</td>
      <td><div style="display:flex;align-items:center;gap:4px">${cr?avatarHtml(cr):''}${pts.length?'<div class="avatars-stack">'+pts.map(m=>avatarHtml(m)).join('')+'</div>':''}</div></td>
      <td class="priority-cell">${priorityHtml(t.priority)}</td>
      <td>${statusHtml(t.status)}</td>
      <td>${tagHtml(t.cat)}</td>
      <td style="font-size:11px;color:var(--text2);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.notes||''}</td>
    </tr>`;
  }).join('');
}

function setTaskFilter(f,el){
  taskFilter=f;
  document.querySelectorAll('[id^="fl-"]').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  renderTaskList();
}
function sortTasks(k){
  if(sortKey===k)sortAsc=!sortAsc;else{sortKey=k;sortAsc=true}
  renderTaskList();
}
function toggleTask(id){
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  t.done=!t.done;
  t.status=t.done?'done':(t.status==='done'?'notstarted':t.status);
  renderTaskList();renderCalendar();renderProgress();
}

function renderProgress(){
  const years=Array.from(new Set(tasks.map(t=>t.date?t.date.split('-')[0]:''))).filter(Boolean).sort();
  document.getElementById('yearProg').innerHTML=years.map(y=>{
    const yt=tasks.filter(t=>t.date&&t.date.startsWith(y));
    const yd=yt.filter(t=>t.done).length;
    const pct=yt.length?Math.round(yd/yt.length*100):0;
    return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px"><span>${y}</span><span>${yd}/${yt.length}(${pct}%)</span></div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div>`;
  }).join('');

  const cats=['questionnaire','data','admin','meeting','platform'];
  const catNames={questionnaire:'問卷',data:'資料',admin:'行政',meeting:'會議',platform:'平台'};
  document.getElementById('catProg').innerHTML=cats.map(c=>{
    const ct=tasks.filter(t=>t.cat===c);
    const cd=ct.filter(t=>t.done).length;
    const pct=ct.length?Math.round(cd/ct.length*100):0;
    return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px"><span>${catNames[c]}</span><span>${cd}/${ct.length}(${pct}%)</span></div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div>`;
  }).join('');
}

function switchTab(t,el){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  if(t==='list'){
    document.getElementById('taskListPanel').style.display='flex';
    document.getElementById('progressPanel').style.display='none';
  }else{
    document.getElementById('taskListPanel').style.display='none';
    document.getElementById('progressPanel').style.display='block';
    renderProgress();
  }
}

  document.querySelectorAll('#qTagChips .chip').forEach(b=>b.className='chip');
  renderModalMembers();
  updatePriorityStars();
  document.getElementById('modalTitleText').textContent='新增工作';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('iTitle').focus(),50);
}

  document.getElementById('iDate').value=ds;

  document.getElementById('modalOverlay').classList.remove('open');
}

    <div class="mem-chip ${m.id===selCreator?'sel':''}" id="cr-${m.id}" onclick="pickCreator('${m.id}')">
      <div style="width:16px;height:16px;border-radius:50%;background:${m.bg};color:${m.color};font-size:8px;display:flex;align-items:center;justify-content:center">${m.initials}</div>${m.name}
    </div>`).join('');
  document.getElementById('partChips').innerHTML=MEMBERS.map(m=>`
    <div class="mem-chip ${selParts.includes(m.id)?'sel':''}" id="pt-${m.id}" onclick="togglePart('${m.id}')">
      <div style="width:16px;height:16px;border-radius:50%;background:${m.bg};color:${m.color};font-size:8px;display:flex;align-items:center;justify-content:center">${m.initials}</div>${m.name}
    </div>`).join('');

function pickCreator(id){
  selCreator=id;
  document.querySelectorAll('[id^="cr-"]').forEach(el=>el.classList.remove('sel'));
  const el=document.getElementById('cr-'+id);
  if(el)el.classList.add('sel');
}
function togglePart(id){
  const i=selParts.indexOf(id);
  if(i>=0)selParts.splice(i,1);else selParts.push(id);
  document.querySelectorAll('[id^="pt-"]').forEach(el=>el.classList.remove('sel'));
  selParts.forEach(pid=>{const el=document.getElementById('pt-'+pid);if(el)el.classList.add('sel')});
}
function setPriority(v){selPriority=v;updatePriorityStars()}
function updatePriorityStars(){
  document.querySelectorAll('.pstar').forEach(s=>{
    s.classList.toggle('on',parseInt(s.dataset.v)<=selPriority);
  });
}
function toggleQChip(btn){
  const q=btn.dataset.q;
  if(btn.classList.contains('on-'+q))btn.className='chip';
  else btn.className='chip on-'+q;
}
function saveTask(){
  const title=document.getElementById('iTitle').value.trim();
  if(!title){alert('請輸入工作名稱');return}
  const qtags=[...document.querySelectorAll('#qTagChips .chip')].filter(b=>b.className!=='chip').map(b=>b.dataset.q);
  const data={
    title,desc:document.getElementById('iDesc').value,
    date:document.getElementById('iDate').value,
    deadline:document.getElementById('iDeadline').value,
    cat:document.getElementById('iCat').value,
    status:document.getElementById('iStatus').value,
    priority:selPriority,qtags,
    creator:selCreator,parts:[...selParts],notes:'',
    done:document.getElementById('iStatus').value==='done',
  };
  if(editingId){
    const idx=tasks.findIndex(t=>t.id===editingId);
    if(idx>=0)tasks[idx]={...tasks[idx],...data};
  }else{
    tasks.push({id:nextId++,...data});
  }
  closeModal();
  renderCalendar();renderTaskList();renderProgress();
}

function openDetail(id){
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  const cr=gm(t.creator);
  const pts=(t.parts||[]).map(gm).filter(Boolean);
  const si=STATUS_INFO[t.status]||STATUS_INFO.notstarted;
  document.getElementById('detailPanel').innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
      <div style="font-size:17px;font-weight:600;flex:1;line-height:1.4;color:var(--text)">${t.title}</div>
      <button class="close-btn" onclick="closeDetail()" style="flex-shrink:0;margin-left:8px">✕</button>
    </div>
    ${t.desc?`<div style="font-size:13px;color:var(--text2);margin-bottom:16px">${t.desc}</div>`:''}
    <div class="detail-field">
      <div class="detail-field-label">狀態</div>
      <div class="detail-field-val">${statusHtml(t.status)}</div>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">分類</div>
      <div class="detail-field-val">${tagHtml(t.cat)}</div>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">緊急程度</div>
      <div class="detail-field-val">${priorityHtml(t.priority)}</div>
    </div>
    ${t.date?`<div class="detail-field"><div class="detail-field-label">日期</div><div class="detail-field-val">${t.date}</div></div>`:''}
    ${t.deadline?`<div class="detail-field"><div class="detail-field-label">Deadline</div><div class="detail-field-val" style="color:#8a6b66">${t.deadline}</div></div>`:''}
    ${t.qtags&&t.qtags.length?`<div class="detail-field"><div class="detail-field-label">相關問卷</div><div style="display:flex;gap:4px;flex-wrap:wrap">${t.qtags.map(qtagHtml).join('')}</div></div>`:''}
    <div class="detail-field">
      <div class="detail-field-label">新增者</div>
      <div style="display:flex;align-items:center;gap:6px">${cr?`${avatarHtml(cr,22)}<span style="font-size:13px">${cr.name}</span>`:'-'}</div>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">參與成員</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${pts.map(m=>`<div style="display:flex;align-items:center;gap:4px">${avatarHtml(m,22)}<span style="font-size:12px">${m.name}</span></div>`).join('')||'-'}</div>
    </div>
    <div class="detail-field">
      <div class="detail-field-label">備註</div>
      <textarea class="notes-input" id="detailNotes" placeholder="新增備註...">${t.notes||''}</textarea>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-primary" onclick="saveDetailNotes(${t.id})">儲存備註</button>
      <button class="btn" onclick="editTask(${t.id})">編輯</button>
      <button class="btn" style="margin-left:auto;color:#8a6b66;border-color:#e0d0c5" onclick="deleteTask(${t.id})">刪除</button>
    </div>`;
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail(){document.getElementById('detailOverlay').classList.remove('open')}
function saveDetailNotes(id){
  const t=tasks.find(x=>x.id===id);
  if(t){t.notes=document.getElementById('detailNotes').value;renderTaskList()}
  closeDetail();
}
function editTask(id){
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  closeDetail();
  editingId=id;
  selCreator=t.creator||'m1';
  selParts=[...(t.parts||[])];
  selPriority=t.priority||2;
  document.getElementById('iTitle').value=t.title;
  document.getElementById('iDesc').value=t.desc||'';
  document.getElementById('iDate').value=t.date||'';
  document.getElementById('iDeadline').value=t.deadline||'';
  document.getElementById('iCat').value=t.cat||'admin';
  document.getElementById('iStatus').value=t.status||'notstarted';
  document.querySelectorAll('#qTagChips .chip').forEach(b=>{
    const q=b.dataset.q;
    b.className=(t.qtags||[]).includes(q)?'chip on-'+q:'chip';
  });
  renderModalMembers();
  updatePriorityStars();
  document.getElementById('modalTitleText').textContent='編輯工作';
  document.getElementById('modalOverlay').classList.add('open');
}
function deleteTask(id){
  if(!confirm('確定要刪除這項工作嗎？'))return;
  tasks=tasks.filter(t=>t.id!==id);
  closeDetail();
  renderCalendar();renderTaskList();renderProgress();
}

function switchView(v,el){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.sb-item').forEach(x=>x.classList.remove('active'));
  if(el)el.classList.add('active');
  const titles={dashboard:'總覽',tasks:'代辦工作'};
  document.getElementById('topbarTitle').textContent=titles[v]||v;
  if(v==='tasks')renderTaskList();
}

renderTeam();
renderCalendar();
</script>
</body>
</html>
