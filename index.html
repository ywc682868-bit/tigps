<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIGPS</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf9f7;--bg2:#f1ede8;--bg3:#e8e3db;--text:#5a5651;--text2:#8b8580;--text3:#b4ada5;--border:#e3dcd4;--border2:#d4ccc2;--accent:#6b7171;--radius:8px;
  --cat-data:#d4dce8;--cat-meeting:#e8d4d4;--cat-admin:#d4e8d8;--cat-questionnaire:#e8e2d0;--cat-platform:#ddd4e8;
  --cat-data-text:#4a5a70;--cat-meeting-text:#704a4a;--cat-admin-text:#4a7055;--cat-questionnaire-text:#706040;--cat-platform-text:#604870;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:13px}

/* Page Structure */
.page-container{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{height:60px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;flex-shrink:0;z-index:200;}
.app{display:flex;flex:1;overflow:hidden;}

.sidebar{width:240px;min-width:240px;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;padding:16px 12px;overflow:hidden;transition:width 0.25s,min-width 0.25s,padding 0.25s,border 0.25s}
.sidebar.collapsed{width:0;min-width:0;padding:0;border-right:none}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

.sb-nav{flex:1;overflow-y:auto;padding:12px 0;margin-top:0px}
.team-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.member-cell{display:flex;flex-direction:column;align-items:center;gap:3px}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.sb-item{padding:8px 12px;border-radius:var(--radius);cursor:pointer;color:var(--text2);margin-bottom:2px;user-select:none}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--border);color:var(--text);font-weight:500}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.view{display:none;flex:1;overflow:hidden}
.view.active{display:flex;flex-direction:column}

/* Calendar */
.cal-wrap{display:flex;flex:1;overflow:hidden}
.cal-left{width:190px;min-width:190px;border-right:1px solid var(--border);padding:16px 12px;overflow-y:auto;background:var(--bg2);display:flex;flex-direction:column;gap:16px}
.cal-center{flex:1;display:flex;flex-direction:column;overflow-y:auto;min-height:0}
.cal-right{width:190px;min-width:190px;border-left:1px solid var(--border);padding:16px 12px;overflow-y:auto;background:var(--bg2);display:flex;flex-direction:column;gap:16px}
.cal-side-section{display:flex;flex-direction:column;gap:8px}
.cal-side-title{font-size:10px;font-weight:700;padding:4px 8px;border-radius:4px;display:inline-block;text-transform:uppercase;letter-spacing:0.05em}
.cal-side-title.current{background:#e5e7e6;color:#6b7171}
.cal-side-title.next{background:#e8e0d8;color:#8a7460}
.cal-side-title.deadline{background:#e8e0dd;color:#8a6b66}
.cal-side-title.meeting{background:var(--cat-meeting);color:var(--cat-meeting-text)}
.cal-side-item{font-size:11px;padding:5px 7px;border-radius:4px;color:var(--text2);cursor:pointer;display:flex;gap:4px;align-items:flex-start}
.cal-side-item:hover{background:var(--border);color:var(--text)}
.cal-side-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:3px}
.cal-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.cal-month-year{text-align:center;flex:1}
.cal-nav-title{font-size:20px;font-weight:600;color:var(--text)}
.cal-nav-year{font-size:13px;color:var(--text2);margin-top:2px}
.arrow-btn,.cal-today-btn,.add-round{border:1.5px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.2s}
.add-round{width:32px;height:32px;font-size:18px;line-height:1}
.cal-today-btn{border-radius:var(--radius);width:auto;padding:0 12px;font-size:11px;font-weight:500}
.arrow-btn:hover,.cal-today-btn:hover,.add-round:hover{background:var(--bg2);color:var(--text)}
.cal-grid{padding:10px;display:flex;flex-direction:column;gap:0;flex:1}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);margin-bottom:1px}
.cal-dow{font-size:10px;color:var(--text3);text-align:center;font-weight:600;padding:6px 0;background:var(--bg)}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.cal-cell{min-height:90px;padding:5px;background:var(--bg);cursor:pointer;overflow:hidden;display:flex;flex-direction:column;vertical-align:top}
.cal-cell:hover{background:var(--bg2)}
.cal-cell.weekend{background:#fdf5f0}
.cal-cell.weekend .cal-date-num{color:#c97070}
.cal-cell.holiday .cal-date-num{color:#c97070;font-weight:600}
.cal-cell.other-month{background:#faf9f7!important}
.cal-cell.other-month .cal-date-num{color:var(--text3)}
.cal-date-num{font-size:11px;color:var(--text2);margin-bottom:2px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:500}
.cal-date-num.today{font-weight:700;color:var(--text)}
.cal-cell.is-today{background:#ede8e0}
.cal-chip{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.3}
.cal-chip:hover{opacity:0.8}
.cal-chip.chip-data{background:var(--cat-data);color:var(--cat-data-text)}
.cal-chip.chip-meeting{background:var(--cat-meeting);color:var(--cat-meeting-text)}
.cal-chip.chip-admin{background:var(--cat-admin);color:var(--cat-admin-text)}
.cal-chip.chip-questionnaire{background:var(--cat-questionnaire);color:var(--cat-questionnaire-text)}
.cal-chip.chip-platform{background:var(--cat-platform);color:var(--cat-platform-text)}

/* Tasks table */
.task-toolbar{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;align-items:center}
.filter-chip{padding:4px 12px;font-size:11px;border-radius:12px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;color:var(--text2);transition:all 0.2s;font-weight:500}
.filter-chip:hover{background:var(--bg2)}
.filter-chip.active{border-color:var(--accent);background:#e5e7e6;color:#6b7171}
.table-wrap{flex:1;overflow:auto}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:2;white-space:nowrap}
.data-table td{padding:7px 12px;border-bottom:1px solid var(--border);vertical-align:middle;transition:background 0.2s;}
.data-table tr:hover td{background:var(--bg2)}
.data-table tr.done-row td{opacity:0.4}
.check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;background:transparent}
.check.done{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.status{display:inline-flex;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500}
.st-done{background:#e5e8e3;color:#6f8070}
.st-inprogress{background:#e5e7e6;color:#6b7171}
.st-notstarted{background:var(--bg3);color:var(--text2)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:300;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{position:relative;background:var(--bg);border-radius:12px;border:1px solid var(--border);width:540px;max-height:90vh;overflow-y:auto;padding:24px 28px;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:600}
.close-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);font-size:14px;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
.close-btn:hover{background:var(--bg2)}
.fg{margin-bottom:14px}
.flabel{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:0.05em}
input[type="text"], input[type="date"], input[type="email"], select, textarea{width:100%;padding:8px 12px;font-size:13px;border:1px solid var(--border2);border-radius:8px;background:var(--bg);color:var(--text);outline:none;font-family:inherit;transition:border-color 0.2s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--bg2)}
textarea{resize:vertical;min-height:80px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.btn{padding:8px 18px;font-size:12px;font-weight:500;border-radius:8px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:5px;transition:all 0.2s}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.btn-primary:hover{background:#5a6161}
.btn-danger{color:#c97070;border-color:#e0d0c5}
.btn-danger:hover{background:#fdf0ee}

/* Detail Panel (right slide-in) */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:250;align-items:flex-start;justify-content:flex-end}
.detail-overlay.open{display:flex}
.detail-panel-inner{width:480px;height:100vh;background:var(--bg);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;box-shadow:-4px 0 20px rgba(0,0,0,0.08)}

/* Member edit overlay */
.member-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:310;align-items:center;justify-content:center}
.member-overlay.open{display:flex}

/* Progress */
.prog-bar-wrap{padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
tr[draggable]{cursor:grab}
tr[draggable]:active{cursor:grabbing}

/* Sub rows */
.sub-row{background:var(--bg2)}
.sub-row td{font-size:11px;color:var(--text2)}
</style>
</head>
<body>

<div class="page-container">
  
  <div class="topbar" style="position: relative;">
    <button id="sidebarToggleBtn" onclick="toggleSidebar()" style="border:none;background:transparent;width:36px;height:36px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;color:var(--text);margin-right:12px;">☰</button>
    
    <img src="logo.png" alt="TIGPS LOGO" style="position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); height: 280px; width: auto; object-fit: contain; pointer-events: none;">
    
    <div onclick="switchView('dashboard', null)" style="position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 400px; height: 60px; cursor: pointer; z-index: 10;" title="回首頁/行事曆"></div>
  </div>

  <div class="app">
    <div class="sidebar collapsed" id="mainSidebar">
      <div class="sb-nav">
        <div class="team-grid" id="sidebarTeam"></div>
        <div class="sb-item" onclick="switchView('progress',this)">📊 工作進度</div>
      </div>
    </div>

    <div class="main">
      <div class="content">

        <div class="view active" id="view-dashboard">
          <div class="cal-wrap">
            <div class="cal-left">
              <div class="cal-side-section">
                <span class="cal-side-title current">當月代辦</span>
                <div id="dashCurrentMonth"></div>
              </div>
              <div class="cal-side-section">
                <span class="cal-side-title next">次月代辦</span>
                <div id="dashNextMonth"></div>
              </div>
            </div>

            <div class="cal-center">
              <div class="cal-nav">
                <button class="arrow-btn" onclick="changeCalMonth(-1)">‹</button>
                <div class="cal-month-year">
                  <div class="cal-nav-title" id="calMonthTitle"></div>
                  <div class="cal-nav-year" id="calYearLabel"></div>
                </div>
                <button class="arrow-btn" onclick="changeCalMonth(1)">›</button>
                <button class="cal-today-btn" onclick="goToday()">Today</button>
                <button class="add-round" onclick="openAdd()" style="margin-left:auto">＋</button>
              </div>
              <div class="cal-grid">
                <div class="cal-dow-row">
                  <div class="cal-dow">日</div><div class="cal-dow">一</div><div class="cal-dow">二</div>
                  <div class="cal-dow">三</div><div class="cal-dow">四</div><div class="cal-dow">五</div><div class="cal-dow">六</div>
                </div>
                <div class="cal-body" id="calBody"></div>
              </div>
            </div>

            <div class="cal-right">
              <div class="cal-side-section">
                <span class="cal-side-title deadline">重要事項</span>
                <div id="dashDeadlines"></div>
              </div>
              <div class="cal-side-section">
                <span class="cal-side-title meeting">會議</span>
                <div id="dashMeetings"></div>
              </div>
            </div>
          </div>
        </div><div class="view" id="view-progress">
          <div class="task-toolbar" style="display:flex; justify-content:space-between; align-items:center;">
            <div style="display:flex;gap:6px;flex-wrap:wrap;flex:1" id="progYearTabs"></div>
          </div>
          <div class="prog-bar-wrap" id="progBar"></div>
          <div class="table-wrap">
            <table class="data-table" id="progTable">
              <thead>
                <tr>
                  <th style="width:28px"></th>
                  <th style="min-width:90px">日期</th>
                  <th style="min-width:160px">名稱</th>
                  <th style="min-width:110px">負責人員</th>
                  <th style="min-width:90px">Deadline</th>
                  <th style="min-width:90px">完成日期</th>
                  <th style="width:36px; text-align:center; padding-left:0; padding-right:0;">
                    <button onclick="openProgNew()" style="border:none;background:transparent;cursor:pointer;font-size:18px;color:var(--text2);" title="新增工作">＋</button>
                  </th>
                </tr>
              </thead>
              <tbody id="progTbody"></tbody>
            </table>
          </div>
        </div></div></div></div></div><div class="detail-overlay" id="taskDetailOverlay" onclick="if(event.target===this)closeTaskDetail()">
  <div class="detail-panel-inner">
    <div style="padding: 24px 24px 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-shrink: 0; background: var(--bg);">
      <span id="tdCatBadge" style="font-size: 13px; padding: 4px 12px; border-radius: 4px; font-weight: 600; background: #e8e3db; color: #8b8580;"></span>
      <input type="text" id="tdTitle" style="font-size: 22px; font-weight: 700; flex: 1; color: #5a5651; border: none; background: transparent; outline: none; font-family: inherit;" placeholder="新增工作">
      <button class="close-btn" onclick="closeTaskDetail()" style="border: 1px solid var(--border2); background: #fff; width: 36px; height: 36px; border-radius: 50%;">✕</button>
    </div>
    
    <div style="flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 24px; background: var(--bg);">
      
      <div>
        <div style="color: #8b8580; font-size: 12px; font-weight: 700; margin-bottom: 12px;">負責人員</div>
        <div id="tdAssignees" style="display: flex; gap: 16px; flex-wrap: wrap;"></div>
      </div>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
        <div>
          <div style="color: #8b8580; font-size: 12px; font-weight: 700; margin-bottom: 8px;">日期</div>
          <input type="date" id="tdDate" style="height: 40px; border: 1px solid #d4ccc2; border-radius: 8px; padding: 0 12px; background: #fff;">
        </div>
        <div>
          <div style="color: #8b8580; font-size: 12px; font-weight: 700; margin-bottom: 8px;">DEADLINE</div>
          <input type="date" id="tdDeadline" style="height: 40px; border: 1px solid #d4ccc2; border-radius: 8px; padding: 0 12px; background: #fff;">
        </div>
        <div>
          <div style="color: #8b8580; font-size: 12px; font-weight: 700; margin-bottom: 8px;">完成日期</div>
          <input type="date" id="tdDoneDate" style="height: 40px; border: 1px solid #d4ccc2; border-radius: 8px; padding: 0 12px; background: #fff;">
        </div>
        <div>
          <div style="color: #8b8580; font-size: 12px; font-weight: 700; margin-bottom: 8px;">狀態</div>
          <select id="tdStatus" style="height: 40px; border: 1px solid #d4ccc2; border-radius: 8px; padding: 0 12px; background: #fff;">
            <option value="notstarted">未開始</option>
            <option value="inprogress">進行中</option>
            <option value="done">完成</option>
          </select>
        </div>
      </div>

      <div>
        <div style="color: #8b8580; font-size: 12px; font-weight: 700; margin-bottom: 8px;">說明</div>
        <textarea id="tdDesc" style="min-height: 100px; border: 1px solid #d4ccc2; border-radius: 8px; padding: 12px; background: #fff;"></textarea>
      </div>

      <div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <div style="color: #8b8580; font-size: 13px; font-weight: 700; margin-bottom: 0;">子計畫</div>
          <button onclick="addSubtask()" style="font-size: 13px; padding: 6px 16px; border: 1px solid #d4ccc2; border-radius: 6px; background: #fff; cursor: pointer; color: #8b8580;">＋ 新增</button>
        </div>
        <div id="tdSubtasks"></div>
      </div>

    </div>
    
    <div style="padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: space-between; flex-shrink: 0; background: var(--bg2);">
      <div style="display: flex; gap: 8px;">
        <button class="btn btn-danger" onclick="deleteCurrentTask()" style="background: #fff;">刪除</button>
        <button class="btn" onclick="copyCurrentTask()" style="background: #fff; color: var(--text);">複製</button>
      </div>
      <button class="btn btn-primary" onclick="saveTaskDetail()">儲存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()" style="position: absolute; top: 24px; right: 28px; z-index: 10;">✕</button>

    <div style="display:flex;align-items:flex-end;gap:10px;margin-bottom:12px; flex-wrap: wrap; padding-right: 36px;">
      <div id="creatorChips" style="display:flex;gap:6px;align-items:center;flex-shrink:0"></div>
      
      <div class="fg" style="flex:0 0 auto;margin-bottom:0">
        <label class="flabel">波次</label>
        <select id="iProgYear" style="padding:7px 5px;width:88px"></select>
      </div>
      
      <div class="fg" style="flex:0 0 auto;margin-bottom:0">
        <label class="flabel">類型</label>
        <select id="iCat" style="padding:7px 6px;width:90px" onchange="updateCatColor(this)">
          <option value="data">📋 資料</option>
          <option value="meeting">🗓 會議</option>
          <option value="admin">📁 行政</option>
          <option value="questionnaire">📝 問卷</option>
          <option value="platform">💻 平台</option>
        </select>
      </div>
      
      <div class="fg" style="flex:0 0 auto;margin-bottom:0">
        <label class="flabel" style="visibility:hidden">!</label>
        <select id="iUrgency" style="padding:7px 4px;width:54px;text-align:center">
          <option value="low">！</option>
          <option value="mid">！！</option>
          <option value="high">！！！</option>
        </select>
      </div>

      <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px; margin-left: 6px;">
        <label style="cursor:pointer; display:flex; align-items:center; gap:4px; font-size:12px; color:var(--text2); font-weight: 500;">
          <input type="checkbox" id="iDoneCheckbox" style="width:14px; height:14px;"> 完成
        </label>
        <label style="cursor:pointer; display:flex; align-items:center; gap:4px; font-size:12px; color:var(--text2); font-weight: 500;" title="寄信通知參與成員">
          <input type="checkbox" id="iAlarmCheckbox" style="width:14px; height:14px;"> ⏰
        </label>
      </div>
    </div>

    <div style="margin-bottom:18px; padding-bottom: 8px; border-bottom: 1px solid var(--border);">
      <input type="text" id="iTitle" placeholder="輸入名稱..." style="width:100%;font-size:18px;font-weight:600;border:none;border-radius:0;padding:0;background:transparent;outline:none;">
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:16px">
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="fg" style="margin-bottom:0"><label class="flabel">日期</label><input type="date" id="iDate"></div>
        <div class="fg" style="margin-bottom:0">
          <label class="flabel">時間</label>
          <div style="display:flex;gap:4px">

function getMemberAvatar(m, size = 24) {
  if (!m) return '';
  const saved = memberData[m.id] || {};
  const name = saved.name || m.name || '?';
  const photo = saved.photo || m.photo;
  const initials = (saved.name || m.name || '?').charAt(0);

function getProgTask(atKey) {
  const ys = String(progYear);
  return tasks.find(t =>
    t.annualKey === atKey &&
    (String(t.progYear) === ys || (t.progYear == null && ys === '2023'))
  ) || null;
}

function waveLabel(y) {
  const idx = progYears.indexOf(y);
  return idx >= 0 ? `W${idx+1} ${y}` : `W? ${y}`;
}

function getAllCalendarEvents() {
  let events = [];
  tasks.filter(t => !t.deleted).forEach(t => {
    if (t.date || t.deadline) {
      events.push({
        id: t.id,
        annualKey: t.annualKey,
        title: t.title,
        date: t.date,
        deadline: t.deadline,
        cat: t.cat || 'data',
        done: t.done,
        urgency: t.urgency,
        isSub: false
      });
    }
    if (t.subtasks) {
      Object.entries(t.subtasks).forEach(([sKey, s]) => {
        if (s.date || s.deadline) {
          events.push({
            id: t.id,
            annualKey: t.annualKey, 
            title: `↳ ${s.title || '子計畫'}`,
            date: s.date,
            deadline: s.deadline,
            cat: t.cat || 'data',
            done: s.done,
            urgency: t.urgency,
            isSub: true
          });
        }
      });
    }
  });
  return events;
}

function onPhotoChange(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 64;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
      else { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.45);
      refreshPhotoUI(compressed);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Calendar ──────────────────────────────────────────────────────────────────
function renderCalendar() {
  document.getElementById('calMonthTitle').textContent = MONTHS[calMonth];
  document.getElementById('calYearLabel').textContent = calYear + '年';
  const first = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth + 1, 0).getDate();
  const startDow = first.getDay();
  const monthStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}`;

  let cells = '';
  const prevMonth = calMonth === 0 ? 11 : calMonth - 1;
  const prevYear = calMonth === 0 ? calYear - 1 : calYear;
  const prevLastDay = new Date(prevYear, prevMonth + 1, 0).getDate();
  
  const allEvts = getAllCalendarEvents();

  for (let i = 0; i < startDow; i++) {
    const d = prevLastDay - startDow + i + 1;
    cells += `<div class="cal-cell other-month"><div class="cal-date-num">${d}</div></div>`;
  }

  for (let d = 1; d <= lastDay; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt = allEvts.filter(e => e.date === ds);
    const dlTasks = allEvts.filter(e => e.deadline === ds && e.date !== ds);
    const allChips = [...dt, ...dlTasks];
    const isT = new Date(calYear, calMonth, d).getTime() === today.getTime();
    const numCls = isT ? 'cal-date-num today' : 'cal-date-num';
    const dow = new Date(ds).getDay();
    const weekendCls = (dow === 0 || dow === 6) ? 'weekend' : '';
    const holidayName = TW_HOLIDAYS[ds] || '';
    const holidayCls = holidayName ? 'holiday' : '';
    const todayCls = isT ? 'is-today' : '';
    const holidayLabel = holidayName
      ? `<div style="font-size:8px;color:#c97070;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${holidayName}</div>`
      : '';
    const chips = allChips.slice(0, 3).map(e => {
      const isDL = e.deadline === ds && e.date !== ds;
      const border = isDL ? 'border-left:2px solid #c97070;' : '';
      const clickAction = `openEdit('${e.id}')`;
      return `<div class="cal-chip chip-${e.cat||'data'}" style="${border}" onclick="${clickAction};event.stopPropagation()">${e.title}</div>`;
    }).join('');
    const more = allChips.length > 3 ? `<div style="font-size:9px;color:var(--text3);padding:1px">+${allChips.length-3}</div>` : '';
    cells += `<div class="cal-cell ${weekendCls} ${holidayCls} ${todayCls}" onclick="openAddOnDate('${ds}')">
      <div class="${numCls}">${d}</div>${holidayLabel}${chips}${more}
    </div>`;
  }

  const total = startDow + lastDay;
  const rem = (7 - total % 7) % 7;
  for (let i = 0; i < rem; i++) cells += `<div class="cal-cell other-month"><div class="cal-date-num">${i+1}</div></div>`;
  document.getElementById('calBody').innerHTML = cells;
}

function changeCalMonth(d) {
  calMonth += d;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
  renderDashSidebar();
}
function goToday() { calYear = new Date().getFullYear(); calMonth = new Date().getMonth(); renderCalendar(); renderDashSidebar(); }

function renderDashSidebar() {
  const now = new Date();
  const curY = now.getFullYear(), curM = now.getMonth();
  const curStr = `${curY}-${String(curM+1).padStart(2,'0')}`;
  
  const nextY = curM === 11 ? curY + 1 : curY;
  const nextM = curM === 11 ? 0 : curM + 1;
  const nextStr = `${nextY}-${String(nextM+1).padStart(2,'0')}`;

  const allEvts = getAllCalendarEvents();
  const cur = allEvts.filter(e => e.date && e.date.startsWith(curStr) && !e.done && e.cat !== 'meeting');
  const nxt = allEvts.filter(e => e.date && e.date.startsWith(nextStr) && !e.done && e.cat !== 'meeting');
  const urgent = allEvts.filter(e => e.urgency === 'high' && !e.done).sort((a,b) => (a.date||'').localeCompare(b.date||''));
  const mtg = allEvts.filter(e => e.cat === 'meeting' && e.date && !e.done).sort((a,b) => a.date.localeCompare(b.date));

  const renderItem = e => {
    const clickAction = `openEdit('${e.id}')`;
    return `<div class="cal-side-item" onclick="${clickAction}">
      <div class="cal-side-dot" style="background:#8a6b66;margin-top:4px"></div>
      <div><div style="font-size:11px;line-height:1.3">${e.title}</div><div style="font-size:10px;color:var(--text3)">${e.date||''}</div></div>
    </div>`;
  };

  const empty = '<div style="font-size:11px;color:var(--text3)">無</div>';
  document.getElementById('dashCurrentMonth').innerHTML = cur.length ? cur.map(renderItem).join('') : empty;
  document.getElementById('dashNextMonth').innerHTML = nxt.length ? nxt.map(renderItem).join('') : empty;
  document.getElementById('dashDeadlines').innerHTML = urgent.length ? urgent.map(renderItem).join('') : empty;
  
  document.getElementById('dashMeetings').innerHTML = mtg.length ? mtg.map(e => {
    const clickAction = `openEdit('${e.id}')`;
    return `<div class="cal-side-item" onclick="${clickAction}">
      <div class="cal-side-dot" style="background:var(--cat-meeting-text);margin-top:4px"></div>
      <div><div style="font-size:11px;line-height:1.3">${e.title}</div><div style="font-size:10px;color:var(--text3)">${e.date||''}</div></div>
    </div>`;
  }).join('') : empty;
}

function yearTabDragLeave(ev) { ev.currentTarget.style.transform = 'none'; ev.currentTarget.style.boxShadow = 'none'; }

function renderProgContent() {
  const barEl = document.getElementById('progBar');
  const tbody = document.getElementById('progTbody');
  if (!barEl || !tbody) return;
  let yearTasks = [];
  ANNUAL_TASKS.forEach(at => {
    const t = getProgTask(at.key);
    if (t && t.deleted) return; 
    yearTasks.push({ at, t });
  });
  const customTasks = tasks.filter(t => (String(t.progYear) === String(progYear) || (t.progYear == null && String(progYear) === '2023')) && t.annualKey && t.annualKey.startsWith('custom_') && !t.deleted);
  customTasks.forEach(t => yearTasks.push({ at: { key: t.annualKey, label: t.title }, t }));
  let yearOrder = progOrders[progYear] || [];
  yearTasks.sort((a, b) => {
    const aDone = a.t && a.t.done ? 1 : 0;
    const bDone = b.t && b.t.done ? 1 : 0;
    if (aDone !== bDone) return aDone - bDone;
    const aIdx = yearOrder.indexOf(a.at.key);
    const bIdx = yearOrder.indexOf(b.at.key);
    if (aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
    if (aIdx !== -1) return -1;
    if (bIdx !== -1) return 1;
    const aAnnIdx = ANNUAL_TASKS.findIndex(x => x.key === a.at.key);
    const bAnnIdx = ANNUAL_TASKS.findIndex(x => x.key === b.at.key);
    return aAnnIdx - bAnnIdx;
  });
  const doneCount = yearTasks.filter(x => x.t && x.t.done).length;
  const pct = yearTasks.length === 0 ? 0 : Math.round(doneCount / yearTasks.length * 100);
  barEl.innerHTML = `<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:5px">
    <span>${waveLabel(progYear)} 年度完成進度</span>
    <span>${doneCount} / ${yearTasks.length}（${pct}%）</span>
  </div>
  <div style="height:8px;background:var(--bg3);border-radius:4px;overflow:hidden">
    <div style="height:100%;background:var(--accent);width:${pct}%;transition:width 0.4s;"></div>
  </div>`;
  let html = '';
  for (const { at, t } of yearTasks) {
    const isDone = !!(t && t.done);
    const parts = t && Array.isArray(t.parts) ? t.parts : [];
    const assignees = getActiveMembers().filter(m => parts.includes(m.id)).map(m => `<span style="display:flex;flex-direction:column;align-items:center;gap:2px">
        ${getMemberAvatar(m, 22)}
        <span style="font-size:8px;color:var(--text3)">${m.name}</span>
      </span>`).join('');
    const subs = t && t.subtasks ? Object.entries(t.subtasks) : [];
    const hasSub = subs.length > 0;
    const subDone = subs.filter(([k,s]) => s && s.done).length;
    html += `<tr id="dndrow_${at.key}" onclick="openProgDetail('${at.key}')" draggable="true" ondragstart="dndStart(event,'${at.key}')" ondragover="dndOver(event,'${at.key}')" ondragleave="dndLeave(event,'${at.key}')" ondrop="dndDrop(event,'${at.key}')" style="cursor:pointer${isDone?';opacity:0.5':''}">
      <td onclick="event.stopPropagation();quickDone('${at.key}')"><div class="check ${isDone?'done':''}">${isDone?'✓':''}</div></td>
      <td style="font-size:11px;">${t&&t.date?t.date:''}</td>
      <td style="font-weight:${isDone?'400':'500'}">${at.label}${hasSub?`<span style="font-size:9px;color:var(--text3);margin-left:4px">${subDone}/${subs.length}</span>`:''}</td>
      <td><div style="display:flex;gap:3px;flex-wrap:wrap">${assignees}</div></td>
      <td style="font-size:11px;">${t&&t.deadline?t.deadline:''}</td>
      <td style="font-size:11px;">${t&&t.doneDate?t.doneDate:''}</td>
      <td><button onclick="event.stopPropagation();openProgDetail('${at.key}')" style="border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:16px;">›</button></td>
    </tr>`;

    if (hasSub) {
      subs.forEach(([subKey, s], si) => {
        if (!s) return;
        const sAssignees = Array.isArray(s.parts)
          ? vis.filter(m => s.parts.includes(m.id)).map(m => getMemberAvatar(m, 18)).join('')
          : '';
        html += `<tr class="sub-row subrow_${at.key}" style="display:none">
          <td style="padding-left:16px">
            <div class="check ${s.done?'done':''}" onclick="progSubToggle('${at.key}','${subKey}')">${s.done?'✓':''}</div>
          </td>
          <td style="font-size:10px;color:var(--text3);white-space:nowrap">${s.date||''}</td>
          <td style="font-size:11px;color:var(--text2);${s.done?'text-decoration:line-through':''}">↳ ${s.title||''}</td>
          <td><div style="display:flex;gap:2px">${sAssignees}</div></td>
          <td style="font-size:10px;color:var(--text3);white-space:nowrap">${s.deadline||''}</td>
          <td style="font-size:10px;color:var(--text3);white-space:nowrap">${s.doneDate||''}</td>
          <td></td>
        </tr>`;
      });
    }
  }
  tbody.innerHTML = html;
}

function updateSubField(subKey, field, val) {
  const t = _detailTaskId ? tasks.find(x => x.id === _detailTaskId) : null;
  if (t && t.subtasks[subKey]) { t.subtasks[subKey][field] = val; db.ref(`tasks/${t.id}/subtasks/${subKey}/${field}`).set(val); }
}

function toggleSubMember(subKey, mid) {
  const t = _detailTaskId ? tasks.find(x => x.id === _detailTaskId) : null;
  if (!t) return;
  const sub = t.subtasks[subKey];
  let parts = [...(sub.parts || [])];
  const idx = parts.indexOf(mid);
  if (idx >= 0) parts.splice(idx, 1); else parts.push(mid);
  sub.parts = parts;
  db.ref(`tasks/${t.id}/subtasks/${subKey}/parts`).set(parts).then(() => renderDetailSubs(t));
}

function addSubtask() {
  const newSub = { title: '', done: false, date: '', deadline: '', doneDate: '', parts: [], createdAt: new Date().toISOString() };
  ensureProgTask(_detailKey, t => {
    db.ref(`tasks/${t.id}/subtasks`).push(newSub).then(() => {
      db.ref(`tasks/${t.id}`).once('value', snap => {
        const updated = { id: t.id, ...snap.val() };
        const idx = tasks.findIndex(x => x.id === t.id);
        if (idx >= 0) tasks[idx] = updated; else tasks.push(updated);
        _detailTaskId = t.id;
        renderDetailSubs(updated);
        renderProgContent();
      });
    });
  });
}

function progSubToggle(atKey, subKey) {
  const t = getProgTask(atKey);
  if (!t || !t.subtasks || !t.subtasks[subKey]) return;
  const cur = t.subtasks[subKey].done;
  db.ref(`tasks/${t.id}/subtasks/${subKey}/done`).set(!cur).then(() => {
    t.subtasks[subKey].done = !cur;
    renderDetailSubs(t); renderProgContent();
  });
}

function deleteDetailSub(subKey) {
  if (!confirm('確定刪除子計畫？')) return;
  const t = _detailTaskId ? tasks.find(x => x.id === _detailTaskId) : null;
  if (!t) return;
  db.ref(`tasks/${t.id}/subtasks/${subKey}`).remove().then(() => { delete t.subtasks[subKey]; renderDetailSubs(t); renderProgContent(); });
}

function saveTaskDetail() {
  const status = document.getElementById('tdStatus').value;
  const data = { annualKey: _detailKey, progYear: String(progYear), title: document.getElementById('tdTitle').value.trim() || '未命名工作', date: document.getElementById('tdDate').value, deadline: document.getElementById('tdDeadline').value, doneDate: document.getElementById('tdDoneDate').value, status, desc: document.getElementById('tdDesc').value, done: status === 'done', deleted: false };
  const t = _detailTaskId ? tasks.find(x => x.id === _detailTaskId) : null;
  if (t) {
    data.parts = t.parts || []; data.subtasks = t.subtasks || {};
    db.ref('tasks/' + _detailTaskId).update(data).then(() => { Object.assign(t, data); renderProgContent(); closeTaskDetail(); });
  } else {
    data.parts = []; data.subtasks = {};
    db.ref('tasks').push(data).then(ref => { tasks.push({ id: ref.key, ...data }); renderProgContent(); closeTaskDetail(); });
  }
}

function copyCurrentTask() {
  const fresh = _detailKey ? getProgTask(_detailKey) : null;
  if (fresh) _detailTaskId = fresh.id;
  if (!_detailTaskId) { alert('請先點擊「儲存」後再進行複製！'); return; }
  const t = tasks.find(x => x.id === _detailTaskId);
  if (!t || !confirm('確定要完整複製此工作（包含所有子計畫與負責人）嗎？')) return;
  const newKey = 'custom_' + Date.now();
  const newData = { ...t, annualKey: newKey, title: t.title + ' (複製)', createdAt: new Date().toISOString() };
  delete newData.id;
  db.ref('tasks').push(newData).then(() => { openProgDetail(newKey); renderProgContent(); });

function deleteCurrentTask() {
  const fresh = _detailKey ? getProgTask(_detailKey) : null;
  if (fresh) _detailTaskId = fresh.id;
  if (!_detailTaskId) { closeTaskDetail(); return; }
  if (!confirm('確定要刪除此工作的所有資料（包含子計畫）？')) return;
  db.ref('tasks/' + _detailTaskId).update({ deleted: true }).then(() => {
    const idx = tasks.findIndex(x => x.id === _detailTaskId);
    if (idx >= 0) tasks[idx].deleted = true;
    _detailTaskId = null; _detailKey = null; closeTaskDetail(); renderProgContent();
  });
}

function closeTaskDetail() { document.getElementById('taskDetailOverlay').classList.remove('open'); }

function ensureProgTask(atKey, cb) {
  let t = getProgTask(atKey);
  if (t) { cb(t); return; }
  const at = ANNUAL_TASKS.find(x => x.key === atKey);
  const data = { annualKey: atKey, progYear: String(progYear), title: at ? at.label : (document.getElementById('tdTitle')?.value || '未命名工作'), done: false, status: 'notstarted', parts: [], subtasks: {}, deleted: false };
  db.ref('tasks').push(data).then(ref => { const newT = { id: ref.key, ...data }; tasks.push(newT); cb(newT); });
}

// ── Drag & Drop Reordering Logic ──
function dndStart(ev, atKey) { _dndSrc = atKey; _dndAction = null; ev.dataTransfer.effectAllowed = 'move'; ev.dataTransfer.setData('text/plain', atKey); }
function dndOver(ev, atKey) {
  if (atKey === _dndSrc) return;
  ev.preventDefault();
  const row = document.getElementById('dndrow_' + atKey); if (!row) return;
  const rect = row.getBoundingClientRect(); const y = ev.clientY - rect.top;
  row.style.borderTop = ''; row.style.borderBottom = ''; row.style.backgroundColor = ''; row.style.outline = '';
  if (y < rect.height * 0.3) { row.style.borderTop = '2px solid var(--accent)'; _dndAction = 'above'; }
  else if (y > rect.height * 0.7) { row.style.borderBottom = '2px solid var(--accent)'; _dndAction = 'below'; }
  else { row.style.backgroundColor = 'var(--bg3)'; row.style.outline = '2px dashed var(--accent)'; _dndAction = 'subtask'; }
}
function dndLeave(ev, atKey) { const row = document.getElementById('dndrow_' + atKey); if (row) { row.style.borderTop = ''; row.style.borderBottom = ''; row.style.backgroundColor = ''; row.style.outline = ''; } }
function dndDrop(ev, targetKey) {
  ev.preventDefault();
  document.querySelectorAll('.data-table tr').forEach(r => { r.style.borderTop = ''; r.style.borderBottom = ''; r.style.backgroundColor = ''; r.style.outline = ''; });
  const srcKey = _dndSrc; const action = _dndAction; _dndSrc = null; _dndAction = null;
  if (!srcKey || srcKey === targetKey) return;
  if (action === 'subtask') {
    const srcTask = getProgTask(srcKey); if (!confirm(`確定將其變為子計畫？此操作無法還原。`)) return;
    const sub = { title: srcTask?srcTask.title:srcKey, done: srcTask?srcTask.done:false, date: srcTask?srcTask.date:'', deadline: srcTask?srcTask.deadline:'', doneDate: srcTask?srcTask.doneDate:'', parts: srcTask?srcTask.parts:[], createdAt: new Date().toISOString() };
    ensureProgTask(targetKey, targetTask => {
      db.ref('tasks/' + targetTask.id + '/subtasks').push(sub).then(() => {
        if (srcTask) db.ref('tasks/' + srcTask.id).update({deleted: true});
      });
    });
    return;
  }
  let yearTasks = [];
  ANNUAL_TASKS.forEach(at => { const t = getProgTask(at.key); if (!(t && t.deleted)) yearTasks.push({ at, t }); });
  const customTasks = tasks.filter(t => (String(t.progYear) === String(progYear) || (t.progYear == null && String(progYear) === '2023')) && t.annualKey && t.annualKey.startsWith('custom_') && !t.deleted);
  customTasks.forEach(t => yearTasks.push({ at: { key: t.annualKey, label: t.title }, t }));
  let yearOrder = progOrders[progYear] || [];
  yearTasks.sort((a,b) => (a.t&&a.t.done?1:0)-(b.t&&b.t.done?1:0) || (yearOrder.indexOf(a.at.key)-yearOrder.indexOf(b.at.key)));
  let currentKeys = yearTasks.map(x => x.at.key);
  const srcIdx = currentKeys.indexOf(srcKey); const tgtIdx = currentKeys.indexOf(targetKey);
  if (srcIdx > -1 && tgtIdx > -1) {
    currentKeys.splice(srcIdx, 1);
    let newTgtIdx = currentKeys.indexOf(targetKey);
    if (action === 'below') newTgtIdx += 1;
    currentKeys.splice(newTgtIdx, 0, srcKey);
    db.ref('progOrders/' + progYear).set(currentKeys);
  }
}

function openAdd() {
  editingId = null; selCreator = getActiveMembers()[0]?.id || ''; selParts = [];
  document.getElementById('iTitle').value = ''; document.getElementById('iDesc').value = '';

  document.getElementById('iDeadlineH').value = ''; document.getElementById('iDeadlineM').value = '';
  document.getElementById('iUrgency').value = 'low';
  document.getElementById('iDoneCheckbox').checked = false; document.getElementById('iAlarmCheckbox').checked = false;
  updateCatColor(document.getElementById('iCat'));
  document.querySelector('#modalOverlay .btn-primary').textContent = '新增';
  document.getElementById('modalDeleteBtn').style.display = 'none';
  renderProgYearSelect(progYear); renderModalMembers();
  document.getElementById('modalOverlay').classList.add('open');
}
function openAddOnDate(ds) { openAdd(); document.getElementById('iDate').value = ds; }
function openEdit(id) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  editingId = id; selCreator = t.creator || ''; selParts = [...(t.parts || [])];
  document.getElementById('iTitle').value = t.title || ''; document.getElementById('iDesc').value = t.desc || '';
  document.getElementById('iDate').value = t.date || ''; document.getElementById('iDeadline').value = t.deadline || '';
  const tp = t.time ? t.time.split(':') : []; document.getElementById('iTimeH').value = tp[0] || ''; document.getElementById('iTimeM').value = tp[1] || '';
  const dp = t.deadlineTime ? t.deadlineTime.split(':') : []; document.getElementById('iDeadlineH').value = dp[0] || ''; document.getElementById('iDeadlineM').value = dp[1] || '';
  document.getElementById('iUrgency').value = t.urgency || 'low';
  document.getElementById('iDoneCheckbox').checked = t.done || false;
  document.getElementById('iAlarmCheckbox').checked = t.alarm || false;
  const cat = document.getElementById('iCat'); cat.value = t.cat || 'data'; updateCatColor(cat);
  document.querySelector('#modalOverlay .btn-primary').textContent = '儲存';
  document.getElementById('modalDeleteBtn').style.display = '';
  renderProgYearSelect(t.progYear || progYear); renderModalMembers();
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function updateCatColor(sel) { const colors = { data:'#dce4ef', meeting:'#efdcdc', admin:'#dceee0', questionnaire:'#eee8d8', platform:'#e5dced' }; sel.style.background = colors[sel.value] || ''; }
function renderProgYearSelect(y) { document.getElementById('iProgYear').innerHTML = progYears.map(yr => `<option value="${yr}" ${String(yr)===String(y)?'selected':''}>${waveLabel(yr)}</option>`).join(''); }
function renderModalMembers() {
  const vis = getActiveMembers();
  document.getElementById('creatorChips').innerHTML = vis.map(m => `<div onclick="selCreator='${m.id}';renderModalMembers()" style="cursor:pointer;opacity:${m.id===selCreator?1:0.4}">${m.photo?`<img src="${m.photo}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;${m.id===selCreator?'box-shadow:0 0 0 2.5px var(--accent);':''}">`:`<div style="width:32px;height:32px;border-radius:50%;background:${m.bg};color:#555;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;${m.id===selCreator?'box-shadow:0 0 0 2.5px var(--accent);':''}">${m.initials}</div>`}</div>`).join('');
  document.getElementById('partChips').innerHTML = vis.map(m => `<div onclick="(function(){const i=selParts.indexOf('${m.id}');i>=0?selParts.splice(i,1):selParts.push('${m.id}');renderModalMembers();})()" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;opacity:${selParts.includes(m.id)?1:0.4}">
      ${m.photo?`<img src="${m.photo}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;${selParts.includes(m.id)?'box-shadow:0 0 0 2.5px var(--accent);':''}">`:`<div style="width:40px;height:40px;border-radius:50%;background:${m.bg};color:#555;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;${selParts.includes(m.id)?'box-shadow:0 0 0 2.5px var(--accent);':''}">${m.initials}</div>`}
      <span style="font-size:9px;color:var(--text2);">${m.name}</span>
    </div>`).join('');
}
function saveTask() {
  const title = document.getElementById('iTitle').value.trim(); if (!title) return alert('請輸入名稱');
  const isDone = document.getElementById('iDoneCheckbox').checked;
  const isAlarm = document.getElementById('iAlarmCheckbox').checked;
  const data = { title, desc: document.getElementById('iDesc').value, date: document.getElementById('iDate').value, time: (document.getElementById('iTimeH').value && document.getElementById('iTimeM').value)?`${document.getElementById('iTimeH').value}:${document.getElementById('iTimeM').value}`:'', deadline: document.getElementById('iDeadline').value, deadlineTime: (document.getElementById('iDeadlineH').value && document.getElementById('iDeadlineM').value)?`${document.getElementById('iDeadlineH').value}:${document.getElementById('iDeadlineM').value}`:'', cat: document.getElementById('iCat').value, urgency: document.getElementById('iUrgency').value, status: isDone?'done':'notstarted', creator: selCreator, parts: [...selParts], done: isDone, alarm: isAlarm, progYear: document.getElementById('iProgYear').value, timestamp: new Date().toISOString() };
  if (!editingId) data.annualKey = 'custom_' + Date.now();
  if (editingId) db.ref('tasks/' + editingId).update(data); else db.ref('tasks').push(data);
  closeModal(); if (isAlarm) sendAlarmEmail(title, selParts);
}
function deleteEditingTask() { if (editingId && confirm('確定要刪除？')) db.ref('tasks/' + editingId).update({ deleted: true }).then(closeModal); }
function toggleSidebar() { document.getElementById('mainSidebar').classList.toggle('collapsed'); }
function switchView(v, el) {
  document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
  const target = document.getElementById('view-' + v); if (target) target.classList.add('active');
  document.querySelectorAll('.sb-item').forEach(x => x.classList.remove('active')); if (el) el.classList.add('active');
  if (v === 'progress') renderProgContent(); else if (v === 'dashboard') { renderCalendar(); renderDashSidebar(); }
}
initProgTabs(); renderCalendar();
</script>
</body>
</html>
