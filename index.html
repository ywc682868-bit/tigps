<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIGPS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf9f7;--bg2:#f1ede8;--bg3:#e8e3db;--text:#5a5651;--text2:#8b8580;--text3:#b4ada5;--border:#e3dcd4;--border2:#d4ccc2;--accent:#6b7171;--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;padding:16px 12px;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sb-logo{display:flex;align-items:center;gap:10px;padding:0 0 16px;border-bottom:1px solid var(--border);cursor:pointer}
.sb-logo-icon{width:32px;height:32px;background:var(--text);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--bg);font-weight:700}
.sb-logo-text{font-size:16px;font-weight:600}
.sb-nav{flex:1;overflow-y:auto;padding:12px 0;margin-top:12px}
.team-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.sb-item{padding:8px 12px;border-radius:var(--radius);cursor:pointer;color:var(--text2);margin-bottom:2px}
.sb-item:hover{background:var(--bg3)}
.sb-item.active{background:var(--border);color:var(--text);font-weight:500}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.view{display:none;flex:1;overflow:hidden}
.view.active{display:flex;flex-direction:column}
.cal-wrap{display:flex;flex:1;overflow:hidden}
.cal-left{width:200px;border-right:1px solid var(--border);padding:14px;overflow-y:auto;background:var(--bg2);display:flex;flex-direction:column;gap:12px}
.cal-center{flex:1;display:flex;flex-direction:column;overflow-y:auto}
.cal-right{width:200px;border-left:1px solid var(--border);padding:14px;overflow-y:auto;background:var(--bg2)}
.cal-side-title{font-size:10px;font-weight:700;padding:4px 8px;border-radius:4px;display:inline-block;text-transform:uppercase}
.cal-side-title.current{background:#e5e7e6;color:#6b7171}
.cal-side-title.next{background:#e8e0d8;color:#8a7460}
.cal-side-item{font-size:11px;padding:5px 7px;border-radius:4px;color:var(--text2);cursor:pointer;margin-bottom:4px}
.cal-side-item:hover{background:var(--border);color:var(--text)}
.cal-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:16px 20px;border-bottom:1px solid var(--border)}
.cal-nav-title{font-size:20px;font-weight:600}
.cal-nav-year{font-size:13px;color:var(--text2)}
.arrow-btn,.cal-today-btn,.add-round{border:1.5px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center}
.add-round{width:32px;height:32px;font-size:18px}
.arrow-btn:hover,.cal-today-btn:hover,.add-round:hover{background:var(--bg2);color:var(--text)}
.cal-grid{padding:12px;display:flex;flex-direction:column}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);margin-bottom:1px}
.cal-dow{font-size:10px;color:var(--text3);text-align:center;font-weight:600;padding:6px 0;background:var(--bg)}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);flex:1}
.cal-cell{min-height:100px;padding:6px;background:var(--bg);cursor:pointer;overflow:hidden;display:flex;flex-direction:column}
.cal-cell:hover{background:var(--bg2)}
.cal-cell.weekend .cal-date-num{color:#c97070}
.cal-cell.holiday{background:#f5ebe0}
.cal-cell.holiday .cal-date-num{color:#c97070;font-weight:600}
.cal-cell.other-month{background:var(--bg);opacity:0.6}
.cal-date-num{font-size:11px;color:var(--text2);margin-bottom:3px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:500}
.cal-date-num.today{background:var(--accent);color:var(--bg);font-weight:600}
.cal-chip{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.tab-header{display:flex;gap:2px;background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px}
.tab{padding:8px 16px;font-size:12px;border:none;background:transparent;cursor:pointer;color:var(--text2);border-radius:var(--radius)}
.tab:hover{background:var(--bg3)}
.tab.active{background:var(--border);color:var(--text)}
.task-toolbar{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.filter-chip{padding:4px 12px;font-size:11px;border-radius:12px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;color:var(--text2)}
.filter-chip:hover{background:var(--bg2)}
.filter-chip.active{border-color:var(--accent);background:#e5e7e6;color:#6b7171}
.table-wrap{flex:1;overflow:auto}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:8px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0}
.data-table td{padding:7px 12px;border-bottom:1px solid var(--border)}
.data-table tr:hover td{background:var(--bg2)}
.check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.check.done{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.status{display:inline-flex;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500}
.st-done{background:#e5e8e3;color:#6f8070}
.st-inprogress{background:#e5e7e6;color:#6b7171}
.st-notstarted{background:var(--bg3);color:var(--text2)}
.st-blocked{background:#e8e0dd;color:#8a6b66}
.tag{display:inline-flex;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:500}
.tag-data{background:#e5e7e6;color:#6b7171}
.tag-meeting{background:#dfe5e3;color:#5f7070}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:8px;border:1px solid var(--border);width:520px;max-height:88vh;overflow-y:auto;padding:24px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.close-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2)}
.fg{margin-bottom:14px}
.flabel{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase}
input,select,textarea{width:100%;padding:7px 10px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--bg2)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chip-row{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:4px 10px;font-size:11px;border-radius:12px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2)}
.chip:hover{background:var(--bg2)}
.chip.on{border-color:var(--accent);background:#e5e7e6;color:#6b7171}
.mem-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;font-size:11px;border-radius:12px;border:1px solid var(--border2);cursor:pointer;color:var(--text2)}
.mem-chip:hover{background:var(--bg2)}
.mem-chip.sel{border-color:var(--accent);background:#e5e7e6;color:#6b7171}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.btn{padding:6px 14px;font-size:12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text)}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.pstar{font-size:13px;cursor:pointer;color:var(--border2)}
.pstar.on{color:#8a6b66}
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:90;align-items:flex-start;justify-content:flex-end}
.detail-overlay.open{display:flex}
.detail-panel{width:420px;height:100vh;background:var(--bg);border-left:1px solid var(--border);overflow-y:auto;padding:24px}
.detail-field{margin-bottom:14px}
.detail-field-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:4px}
.notes-input{width:100%;padding:8px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);resize:vertical;min-height:80px;font-family:inherit}
.notes-input:focus{outline:none;border-color:var(--accent);background:var(--bg2)}
</style>
</head>
<body>

<div class="app">
<div class="sidebar">
  <div class="sb-logo" onclick="switchView('dashboard',null)">
    <div class="sb-logo-icon">T</div>
    <div class="sb-logo-text">TIGPS</div>
  </div>
  <div class="sb-nav">
    <div class="team-grid" id="sidebarTeam"></div>
    <div class="sb-item active" onclick="switchView('tasks',this)">代辦工作</div>
  </div>
</div>

<div class="main">
  <div class="content">
    <div class="view active" id="view-dashboard">
      <div class="cal-wrap">
        <div class="cal-left">
          <div>
            <div class="cal-side-title current">當月代辦</div>
            <div id="dashCurrentMonth" style="margin-top:6px"></div>
          </div>
          <div>
            <div class="cal-side-title next">次月代辦</div>
            <div id="dashNextMonth" style="margin-top:6px"></div>
          </div>
        </div>
        <div class="cal-center">
          <div class="cal-nav">
            <button class="arrow-btn" onclick="changeCalMonth(-1)">‹</button>
            <div style="text-align:center">
              <div class="cal-nav-title" id="calMonthTitle"></div>
              <div class="cal-nav-year" id="calYearLabel"></div>
            </div>
            <button class="arrow-btn" onclick="changeCalMonth(1)">›</button>
            <button class="cal-today-btn" onclick="goToday()">今天</button>
            <button class="add-round" onclick="openAdd()" style="margin-left:auto">＋</button>
          </div>
          <div class="cal-grid">
            <div class="cal-dow-row">
              <div class="cal-dow">日</div><div class="cal-dow">一</div><div class="cal-dow">二</div>
              <div class="cal-dow">三</div><div class="cal-dow">四</div><div class="cal-dow">五</div><div class="cal-dow">六</div>
            </div>
            <div class="cal-body" id="calBody"></div>
          </div>
        </div>
        <div class="cal-right">
          <div style="margin-bottom:12px">
            <div class="cal-side-title" style="background:#e8e0dd;color:#8a6b66">重要事項</div>
            <div id="dashDeadlines" style="margin-top:6px"></div>
          </div>
          <div style="border-top:1px solid var(--border);padding-top:8px">
            <div class="cal-side-title" style="background:#dfe5e3;color:#5f7070">會議</div>
            <div id="dashMeetings" style="margin-top:6px"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="view" id="view-tasks">
      <div class="tab-header">
        <button class="tab active" onclick="switchTab('list',this)">列表</button>
        <button class="tab" onclick="switchTab('progress',this)">進度</button>
      </div>
      <div id="taskListPanel" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
        <div class="task-toolbar">
          <span style="font-size:11px;color:var(--text2)">分類：</span>
          <button class="filter-chip active" onclick="setTaskFilter('all',this)">全部</button>
          <button class="filter-chip" onclick="setTaskFilter('data',this)">資料</button>
          <button class="filter-chip" onclick="setTaskFilter('meeting',this)">會議</button>
          <div style="margin-left:auto"><button class="add-round" onclick="openAdd()">＋</button></div>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th style="width:32px"></th>
                <th>討論主題</th>
                <th>日期</th>
                <th>人員</th>
                <th>狀態</th>
                <th>類型</th>
              </tr>
            </thead>
            <tbody id="taskTbody"></tbody>
          </table>
        </div>
      </div>
      <div id="progressPanel" style="flex:1;overflow-y:auto;padding:20px;display:none">
        <div id="yearProg"></div>
      </div>
    </div>
  </div>
</div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
<div class="modal">
  <div class="modal-hdr">
    <span id="modalTitleText" style="font-size:16px;font-weight:600">新增工作</span>
    <button class="close-btn" onclick="closeModal()">✕</button>
  </div>
  <div class="fg">
    <label class="flabel">討論主題</label>
    <input type="text" id="iTitle">
  </div>
  <div class="fg">
    <label class="flabel">說明</label>
    <textarea id="iDesc"></textarea>
  </div>
  <div class="two-col">
    <div class="fg">
      <label class="flabel">日期</label>
      <input type="date" id="iDate">
    </div>
    <div class="fg">
      <label class="flabel">Deadline</label>
      <input type="date" id="iDeadline">
    </div>
  </div>
  <div class="two-col">
    <div class="fg">
      <label class="flabel">分類</label>
      <select id="iCat">
        <option value="data">資料</option>
        <option value="meeting">會議</option>
      </select>
    </div>
    <div class="fg">
      <label class="flabel">狀態</label>
      <select id="iStatus">
        <option value="notstarted">Not started</option>
        <option value="inprogress">In progress</option>
        <option value="done">Done</option>
      </select>
    </div>
  </div>
  <div class="fg">
    <label class="flabel">新增者</label>
    <div class="chip-row" id="creatorChips"></div>
  </div>
  <div class="fg">
    <label class="flabel">參與成員</label>
    <div class="chip-row" id="partChips"></div>
  </div>
  <div class="modal-footer">
    <button class="btn" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" onclick="saveTask()">新增</button>
  </div>
</div>
</div>

<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
<div class="detail-panel" id="detailPanel"></div>
</div>

<script async defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
<script async defer src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"></script>

<script>
const MEMBERS=[{id:'m1',name:'李研究員',initials:'李',bg:'#e5ddd8'},{id:'m2',name:'陳助理',initials:'陳',bg:'#dfe5df'},{id:'m3',name:'王助理',initials:'王',bg:'#e5dfd8'},{id:'m4',name:'林助理',initials:'林',bg:'#e5dfe5'}];
const TW_HOLIDAYS_2025={'2025-01-01':true,'2025-02-08':true,'2025-02-09':true,'2025-02-10':true,'2025-02-11':true,'2025-02-28':true,'2025-04-04':true,'2025-04-05':true,'2025-06-10':true,'2025-09-17':true,'2025-10-10':true,'2025-12-25':true};
const TW_HOLIDAYS_2026={'2026-01-01':true,'2026-01-29':true,'2026-01-30':true,'2026-01-31':true,'2026-02-01':true,'2026-02-28':true,'2026-04-04':true,'2026-04-05':true,'2026-06-10':true,'2026-09-17':true,'2026-10-10':true,'2026-12-25':true};
const TW_HOLIDAYS={...TW_HOLIDAYS_2025,...TW_HOLIDAYS_2026};
const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

let calYear=new Date().getFullYear(),calMonth=new Date().getMonth(),taskFilter='all',selCreator='m1',selParts=[],tasks=[],db=null,editingId=null;
const today=new Date();
today.setHours(0,0,0,0);

window.addEventListener('load',()=>{
  firebase.initializeApp({apiKey:'AIzaSyDJz-9QQq4W_7wZZ8K7t5M4n3p2q1r0s9t',authDomain:'tigps-7779e.firebaseapp.com',projectId:'tigps-7779e',storageBucket:'tigps-7779e.appspot.com',messagingSenderId:'933488060768',databaseURL:'https://tigps-7779e-default-rtdb.asia-southeast1.firebasedatabase.app'});
  db=firebase.database();
  renderTeam();
  loadTasks();
});

function renderTeam(){document.getElementById('sidebarTeam').innerHTML=MEMBERS.map(m=>`<div style="display:flex;flex-direction:column;align-items:center;gap:3px"><div class="avatar" style="background:${m.bg}">${m.initials}</div></div>`).join('');}

function loadTasks(){
  if(!db)return;
  db.ref('tasks').on('value',snapshot=>{
    tasks=[];
    snapshot.forEach(child=>{tasks.push({id:child.key,...child.val()});});
    renderCalendar();
    renderTaskList();
  });
}

function renderCalendar(){
  document.getElementById('calMonthTitle').textContent=MONTHS[calMonth];
  document.getElementById('calYearLabel').textContent=calYear+'年';
  const first=new Date(calYear,calMonth,1),lastDay=new Date(calYear,calMonth+1,0).getDate(),startDow=first.getDay(),monthStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}`,monthTasks=tasks.filter(t=>t.date&&t.date.startsWith(monthStr));
  let cells='';
  const prevMonth=calMonth===0?11:calMonth-1,prevYear=calMonth===0?calYear-1:calYear,prevLastDay=new Date(prevYear,prevMonth+1,0).getDate();
  for(let i=0;i<startDow;i++){const prevD=prevLastDay-startDow+i+1;cells+=`<div class="cal-cell other-month"><div class="cal-date-num" style="color:var(--text3)">${prevD}</div></div>`;}
  for(let d=1;d<=lastDay;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,dt=monthTasks.filter(t=>t.date===ds),isT=new Date(calYear,calMonth,d).getTime()===today.getTime(),numCls=isT?'cal-date-num today':'cal-date-num',cellCls=(new Date(ds).getDay()===0||new Date(ds).getDay()===6)?'weekend':'',holidayCls=TW_HOLIDAYS[ds]?'holiday':'',chips=dt.slice(0,3).map(t=>`<div class="cal-chip" style="background:#e5e7e6;color:#6b7171" onclick="openDetail('${t.id}');event.stopPropagation()">${t.title}</div>`).join(''),more=dt.length>3?`<div style="font-size:9px;color:var(--text3);padding:1px">+${dt.length-3}</div>`:'';
    cells+=`<div class="cal-cell ${cellCls} ${holidayCls}"><div class="${numCls}">${d}</div>${chips}${more}</div>`;
  }
  const total=startDow+lastDay,rem=(7-total%7)%7,nextMonth=calMonth===11?0:calMonth+1,nextYear=calMonth===11?calYear+1:calYear;
  for(let i=0;i<rem;i++){cells+=`<div class="cal-cell other-month"><div class="cal-date-num" style="color:var(--text3)">${i+1}</div></div>`;}
  document.getElementById('calBody').innerHTML=cells;
  renderDashSidebar();
}

function changeCalMonth(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function goToday(){calYear=new Date().getFullYear();calMonth=new Date().getMonth();renderCalendar();}

function renderDashSidebar(){
  const now=new Date(),curY=now.getFullYear(),curM=now.getMonth(),nextY=curM===11?curY+1:curY,nextM=curM===11?0:curM+1,curStr=`${curY}-${String(curM+1).padStart(2,'0')}`,nextStr=`${nextY}-${String(nextM+1).padStart(2,'0')}`,cur=tasks.filter(t=>t.date&&t.date.startsWith(curStr)&&t.status!=='done'),nxt=tasks.filter(t=>t.date&&t.date.startsWith(nextStr)&&t.status!=='done'),dl=tasks.filter(t=>t.deadline&&t.status!=='done'),mtg=tasks.filter(t=>t.cat==='meeting'&&t.date);
  const renderSideItem=t=>`<div class="cal-side-item" onclick="openDetail('${t.id}')">${t.title}</div>`;
  document.getElementById('dashCurrentMonth').innerHTML=cur.length?cur.map(renderSideItem).join(''):'<div style="font-size:11px;color:var(--text3)">無</div>';
  document.getElementById('dashNextMonth').innerHTML=nxt.length?nxt.map(renderSideItem).join(''):'<div style="font-size:11px;color:var(--text3)">無</div>';
  document.getElementById('dashDeadlines').innerHTML=dl.length?dl.map(renderSideItem).join(''):'<div style="font-size:11px;color:var(--text3)">無</div>';
  document.getElementById('dashMeetings').innerHTML=mtg.length?mtg.map(renderSideItem).join(''):'<div style="font-size:11px;color:var(--text3)">無</div>';
}

function renderTaskList(){
  let filtered=taskFilter==='all'?[...tasks]:tasks.filter(t=>t.cat===taskFilter);
  document.getElementById('taskTbody').innerHTML=filtered.map(t=>{
    const st=t.status==='done'?'st-done':t.status==='inprogress'?'st-inprogress':t.status==='blocked'?'st-blocked':'st-notstarted';
    return `<tr><td><div class="check ${t.done?'done':''}" onclick="toggleTask('${t.id}')">${t.done?'✓':''}</div></td><td onclick="openDetail('${t.id}')" style="cursor:pointer;color:var(--accent)">${t.title}</td><td>${t.date||''}</td><td>${MEMBERS.filter(m=>t.parts&&t.parts.includes(m.id)).map(m=>m.name).join(',')}</td><td><span class="status ${st}">${t.status}</span></td><td><span class="tag tag-${t.cat}">${t.cat}</span></td></tr>`;
  }).join('');
}

function setTaskFilter(f,el){taskFilter=f;document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderTaskList();}
function toggleTask(id){const t=tasks.find(x=>x.id===id);if(!t||!db)return;t.done=!t.done;t.status=t.done?'done':'notstarted';db.ref('tasks/'+id).update({done:t.done,status:t.status});}

function renderProgress(){
  const years=Array.from(new Set(tasks.map(t=>t.date?t.date.split('-')[0]:'')))..filter(Boolean).sort();
  document.getElementById('yearProg').innerHTML=years.map(y=>{const yt=tasks.filter(t=>t.date&&t.date.startsWith(y)),yd=yt.filter(t=>t.done).length,pct=yt.length?Math.round(yd/yt.length*100):0;return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>${y}</span><span>${yd}/${yt.length}(${pct}%)</span></div><div style="height:6px;background:var(--bg3);border-radius:3px"><div style="height:100%;background:var(--accent);width:${pct}%"></div></div></div>`;}).join('');
}

function switchTab(t,el){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));el.classList.add('active');if(t==='list'){document.getElementById('taskListPanel').style.display='flex';document.getElementById('progressPanel').style.display='none';}else{document.getElementById('taskListPanel').style.display='none';document.getElementById('progressPanel').style.display='block';renderProgress();}}

function openAdd(){editingId=null;selCreator='m1';selParts=[];document.getElementById('iTitle').value='';document.getElementById('iDesc').value='';document.getElementById('iDate').value='';document.getElementById('iDeadline').value='';document.getElementById('iCat').value='data';document.getElementById('iStatus').value='notstarted';renderModalMembers();document.getElementById('modalTitleText').textContent='新增工作';document.getElementById('modalOverlay').classList.add('open');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function renderModalMembers(){document.getElementById('creatorChips').innerHTML=MEMBERS.map(m=>`<div class="mem-chip ${m.id===selCreator?'sel':''}" onclick="selCreator='${m.id}';renderModalMembers()">${m.name}</div>`).join('');document.getElementById('partChips').innerHTML=MEMBERS.map(m=>`<div class="mem-chip ${selParts.includes(m.id)?'sel':''}" onclick="const i=selParts.indexOf('${m.id}');i>=0?selParts.splice(i,1):selParts.push('${m.id}');renderModalMembers()">${m.name}</div>`).join('');}
function saveTask(){const title=document.getElementById('iTitle').value.trim();if(!title||!db){alert('請輸入工作名稱');return;}const data={title,desc:document.getElementById('iDesc').value,date:document.getElementById('iDate').value,deadline:document.getElementById('iDeadline').value,cat:document.getElementById('iCat').value,status:document.getElementById('iStatus').value,creator:selCreator,parts:[...selParts],notes:'',done:false,timestamp:new Date().toISOString()};if(editingId){db.ref('tasks/'+editingId).update(data);}else{db.ref('tasks').push(data);}closeModal();}

function openDetail(id){const t=tasks.find(x=>x.id===id);if(!t)return;document.getElementById('detailPanel').innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div style="font-size:17px;font-weight:600">${t.title}</div><button class="close-btn" onclick="closeDetail()">✕</button></div><div class="detail-field"><div class="detail-field-label">狀態</div><div><span class="status st-${t.status}">${t.status}</span></div></div><div class="detail-field"><div class="detail-field-label">日期</div><div>${t.date||'-'}</div></div><div class="detail-field"><div class="detail-field-label">Deadline</div><div>${t.deadline||'-'}</div></div><div class="detail-field"><div class="detail-field-label">備註</div><textarea class="notes-input" id="detailNotes">${t.notes||''}</textarea></div><div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-primary" onclick="saveDetailNotes('${t.id}')">儲存</button><button class="btn" onclick="deleteTask('${t.id}');closeDetail()">刪除</button></div>`;document.getElementById('detailOverlay').classList.add('open');}
function closeDetail(){document.getElementById('detailOverlay').classList.remove('open');}
function saveDetailNotes(id){const t=tasks.find(x=>x.id===id);if(t&&db){t.notes=document.getElementById('detailNotes').value;db.ref('tasks/'+id).update({notes:t.notes});}closeDetail();}
function deleteTask(id){if(!confirm('確定要刪除?')||!db)return;db.ref('tasks/'+id).remove();}

function switchView(v,el){document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));document.getElementById('view-'+v).classList.add('active');document.querySelectorAll('.sb-item').forEach(x=>x.classList.remove('active'));if(el)el.classList.add('active');}
</script>
</body>
</html>
